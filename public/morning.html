<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌅 晨間儀式</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07081a;
      --bg2:       #0c0e24;
      --surface:   #111328;
      --border:    #2a2d4a;
      --gold:      #D4A84B;
      --gold-light:#F0CF82;
      --gold-dim:  #8a6a28;
      --amber:     #E8956D;
      --amber-dim: #9a5a3a;
      --text:      #e8dfd0;
      --text-muted:#7a7898;
      --silver:    #b0b8cc;
      --glow:      rgba(212,168,75,.3);
      --glow-amber:rgba(232,149,109,.3);
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes star-twinkle {
      0%,100% { opacity: .15; }
      50%      { opacity: .9; }
    }
    @keyframes dawn-glow {
      0%,100% { opacity: .25; }
      50%      { opacity: .5; }
    }
    @keyframes flip-in {
      0%   { transform: rotateY(90deg) scale(.88); opacity: 0; }
      65%  { transform: rotateY(-5deg) scale(1.02); opacity: 1; }
      100% { transform: rotateY(0deg) scale(1); }
    }
    @keyframes burst {
      0%   { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(212,168,75,.7); }
      70%  { transform: scale(1.04); opacity: .9; box-shadow: 0 0 0 40px rgba(212,168,75,0); }
      100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(212,168,75,0); }
    }
    @keyframes check-pop {
      0%   { transform: scale(0); }
      70%  { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    body {
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', 'Noto Serif TC', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Dawn atmosphere ── */
    .dawn-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse 80% 40% at 50% 100%,
        rgba(212,168,75,.07) 0%, transparent 70%);
      animation: dawn-glow 8s ease-in-out infinite;
    }
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; width: 2px; height: 2px;
      background: #fff; border-radius: 50%;
      animation: star-twinkle var(--dur,3s) ease-in-out infinite;
      animation-delay: var(--delay,0s);
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(180deg, rgba(7,8,26,.98), rgba(7,8,26,.9));
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex; align-items: center; gap: 14px;
      backdrop-filter: blur(12px);
    }
    header h1 {
      font-size: 1.1rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--amber));
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 5s linear infinite;
      letter-spacing: .1em; white-space: nowrap;
    }
    .header-right {
      margin-left: auto; display: flex; align-items: center;
      gap: 8px; flex-wrap: wrap;
    }
    .nav-link {
      text-decoration: none; font-size: .8rem; font-weight: 600;
      color: var(--text-muted); padding: 4px 10px;
      border-radius: 999px; border: 1px solid var(--border);
      transition: color .2s, border-color .2s; white-space: nowrap;
    }
    .nav-link:hover { color: var(--silver); border-color: #4a5070; }
    .user-name { font-size: .82rem; color: var(--text-muted); white-space: nowrap; }
    .btn-hdr {
      padding: 4px 11px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; cursor: pointer; font-size: .8rem;
      font-family: inherit; font-weight: 600; color: var(--text-muted);
      transition: border-color .2s, color .2s; white-space: nowrap;
    }
    .btn-hdr:hover { border-color: #4a5070; color: var(--silver); }

    /* ── Main ── */
    .main {
      position: relative; z-index: 1;
      max-width: 680px; margin: 0 auto;
      padding: 36px 20px 80px;
      display: flex; flex-direction: column;
      gap: 24px;
    }

    /* ── Section card base ── */
    .section-card {
      background: linear-gradient(160deg, #141728 0%, #0d0f24 100%);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 26px 28px;
      animation: fade-up .55s ease both;
    }
    .section-title {
      font-size: .72rem; font-weight: 700;
      color: var(--gold-dim); letter-spacing: .22em;
      text-transform: uppercase;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 18px;
    }
    .section-title::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    /* ── Greeting card ── */
    .greeting-card {
      background: linear-gradient(135deg, #141728, #0e1030);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px 32px;
      text-align: center;
      animation: fade-up .5s ease both;
    }
    .greeting-text {
      font-size: 1.6rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--amber));
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 5s linear infinite;
      letter-spacing: .08em; margin-bottom: 8px;
    }
    .greeting-date {
      font-size: 1rem; color: var(--silver);
      letter-spacing: .1em; margin-bottom: 6px;
    }
    .greeting-clock {
      font-size: 2rem; font-weight: 300;
      color: var(--gold); letter-spacing: .12em;
      font-variant-numeric: tabular-nums;
    }

    /* ── Daily rune ── */
    .rune-card {
      animation-delay: .06s;
    }
    .rune-display {
      display: flex; align-items: center; gap: 20px;
    }
    .rune-symbol-big {
      font-size: 4.5rem; line-height: 1;
      color: var(--gold-light);
      text-shadow: 0 0 24px var(--glow), 0 0 48px var(--glow);
      flex-shrink: 0;
    }
    .rune-info { flex: 1; }
    .rune-name-row {
      display: flex; align-items: baseline; gap: 10px;
      margin-bottom: 6px; flex-wrap: wrap;
    }
    .rune-name-en {
      font-size: 1.15rem; font-weight: 700;
      color: var(--gold); letter-spacing: .1em;
    }
    .rune-name-zh {
      font-size: .88rem; color: var(--silver); letter-spacing: .12em;
    }
    .rune-core-short {
      font-size: .9rem; color: var(--text-muted);
      line-height: 1.65; letter-spacing: .04em;
    }
    .reveal-btn {
      margin-top: 14px;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 18px;
      border-radius: 999px;
      border: 1px solid var(--gold-dim);
      background: transparent;
      color: var(--gold-dim); font-size: .8rem; font-weight: 600;
      letter-spacing: .1em; cursor: pointer;
      font-family: inherit;
      transition: color .2s, border-color .2s;
    }
    .reveal-btn:hover { color: var(--gold); border-color: var(--gold); }
    .rune-detail {
      display: none; margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid rgba(42,45,74,.7);
      animation: fade-up .35s ease both;
    }
    .rune-detail.open { display: block; }
    .detail-block { margin-bottom: 14px; }
    .detail-label {
      font-size: .72rem; font-weight: 700; color: var(--gold-dim);
      letter-spacing: .18em; text-transform: uppercase; margin-bottom: 5px;
    }
    .detail-text {
      font-size: .9rem; color: var(--text); line-height: 1.8; letter-spacing: .04em;
    }
    .detail-text.action { color: var(--gold-light); }

    /* ── Intention ── */
    .intention-card { animation-delay: .12s; }
    .intention-input {
      width: 100%; background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 13px 16px;
      color: var(--text); font-size: 1rem;
      font-family: inherit; letter-spacing: .05em;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .intention-input:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px rgba(212,168,75,.1);
    }
    .intention-input::placeholder { color: var(--text-muted); }
    .intention-saved {
      display: none; cursor: pointer;
      padding: 14px 18px;
      background: rgba(212,168,75,.06);
      border: 1px solid rgba(212,168,75,.2);
      border-radius: 10px;
      transition: border-color .2s;
    }
    .intention-saved:hover { border-color: rgba(212,168,75,.4); }
    .intention-saved.visible { display: block; }
    .intention-saved-text {
      font-size: 1.05rem; color: var(--gold-light);
      letter-spacing: .06em; line-height: 1.7; font-style: italic;
    }
    .intention-saved-hint {
      font-size: .72rem; color: var(--text-muted);
      letter-spacing: .08em; margin-top: 5px;
    }

    /* ── Tasks ── */
    .tasks-card { animation-delay: .18s; }
    .task-list { display: flex; flex-direction: column; gap: 10px; }
    .task-item {
      display: flex; align-items: center; gap: 12px;
    }
    .task-checkbox {
      width: 22px; height: 22px; flex-shrink: 0;
      border-radius: 6px; border: 2px solid var(--border);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s;
      background: transparent;
    }
    .task-checkbox.done {
      background: var(--gold);
      border-color: var(--gold);
    }
    .task-checkbox.done::after {
      content: '✓';
      color: var(--bg);
      font-size: .85rem; font-weight: 800;
      animation: check-pop .25s ease both;
    }
    .task-input {
      flex: 1; background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px;
      color: var(--text); font-size: .95rem;
      font-family: inherit; letter-spacing: .04em;
      outline: none; transition: border-color .2s, color .2s;
    }
    .task-input:focus { border-color: var(--gold-dim); }
    .task-input.done {
      text-decoration: line-through;
      color: var(--text-muted);
    }
    .task-input::placeholder { color: var(--text-muted); }

    /* ── Chakra energy ── */
    .chakra-card { animation-delay: .24s; }
    .chakra-energy-wrap {
      display: flex; align-items: flex-start; gap: 14px;
    }
    .chakra-color-bar {
      width: 5px; min-height: 70px; flex-shrink: 0;
      border-radius: 3px;
    }
    .chakra-energy-content { flex: 1; }
    .chakra-name-row {
      display: flex; align-items: baseline; gap: 10px;
      margin-bottom: 8px;
    }
    .chakra-name-big {
      font-size: 1.05rem; font-weight: 700; letter-spacing: .12em;
    }
    .chakra-keywords-sm {
      font-size: .75rem; color: var(--text-muted); letter-spacing: .06em;
    }
    .chakra-affirmation {
      font-size: 1.08rem; font-style: italic;
      line-height: 1.8; letter-spacing: .06em; color: #eee8da;
    }

    /* ── Start button ── */
    .start-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
      animation: fade-up .55s .3s ease both;
    }
    .start-btn {
      padding: 16px 56px;
      border-radius: 999px;
      border: 2px solid var(--gold);
      background: radial-gradient(ellipse at center, rgba(212,168,75,.15) 0%, transparent 70%);
      color: var(--gold-light);
      font-size: 1.05rem; font-weight: 700;
      letter-spacing: .14em; cursor: pointer;
      font-family: inherit;
      transition: background .25s, box-shadow .25s, border-color .25s;
      box-shadow: 0 0 24px var(--glow);
    }
    .start-btn:hover {
      background: radial-gradient(ellipse at center, rgba(212,168,75,.28) 0%, transparent 70%);
      box-shadow: 0 0 48px var(--glow), 0 0 80px rgba(212,168,75,.15);
      border-color: var(--gold-light);
    }
    .start-btn:active { transform: scale(.97); }
    .start-btn.fired { animation: burst .6s ease forwards; }

    /* ── Streak ── */
    .streak-text {
      font-size: .8rem; color: var(--text-muted);
      letter-spacing: .1em; text-align: center;
    }
    .streak-num {
      color: var(--amber); font-weight: 700;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; right: 28px;
      background: #1a1d3a; color: var(--silver);
      border: 1px solid var(--border);
      padding: 10px 20px; border-radius: 10px;
      font-size: .85rem; opacity: 0;
      transition: opacity .3s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      .greeting-text { font-size: 1.3rem; }
      .greeting-clock { font-size: 1.6rem; }
      .rune-symbol-big { font-size: 3.5rem; }
      .section-card { padding: 20px 18px; }
    }
  </style>
</head>
<body>

<div class="dawn-bg"></div>
<div class="stars" id="stars"></div>

<header>
  <h1>🌅 晨間儀式</h1>
  <div class="header-right">
    <a class="nav-link" href="/index.html">📰 文章收藏</a>
    <a class="nav-link" href="/bulletin.html">📢 公告欄</a>
    <a class="nav-link" href="/runes.html">🔮 神諭</a>
    <a class="nav-link" href="/dream.html">🌙 解夢</a>
    <a class="nav-link" href="/rainbow.html">🌈 彩虹卡</a>
    <a class="nav-link" href="/morning.html">🌅 晨間儀式</a>
    <a class="nav-link" href="/iching.html">☯ 易經占卜</a>
    <span class="user-name" id="headerUserName"></span>
    <button class="btn-hdr" onclick="location.href='/settings.html'">設定</button>
    <button class="btn-hdr" onclick="logout()">登出</button>
  </div>
</header>

<div class="main">

  <!-- Greeting -->
  <div class="greeting-card">
    <div class="greeting-text" id="greetingText">早安</div>
    <div class="greeting-date" id="greetingDate"></div>
    <div class="greeting-clock" id="greetingClock"></div>
  </div>

  <!-- Daily rune -->
  <div class="section-card rune-card">
    <div class="section-title">☀ 今日神諭</div>
    <div class="rune-display">
      <div class="rune-symbol-big" id="runeSymbol"></div>
      <div class="rune-info">
        <div class="rune-name-row">
          <span class="rune-name-en" id="runeName"></span>
          <span class="rune-name-zh" id="runeZh"></span>
        </div>
        <div class="rune-core-short" id="runeCore"></div>
        <button class="reveal-btn" id="revealBtn" onclick="toggleRuneDetail()">
          <span id="revealBtnText">展開今日啟示 ▾</span>
        </button>
      </div>
    </div>
    <div class="rune-detail" id="runeDetail">
      <div class="detail-block">
        <div class="detail-label">洞見</div>
        <div class="detail-text" id="runeInsight"></div>
      </div>
      <div class="detail-block">
        <div class="detail-label">行動指引</div>
        <div class="detail-text action" id="runeAction"></div>
      </div>
    </div>
  </div>

  <!-- Intention -->
  <div class="section-card intention-card">
    <div class="section-title">✍️ 今日意圖</div>
    <input
      type="text" class="intention-input" id="intentionInput"
      placeholder="今天，我選擇⋯⋯"
      maxlength="80"
    />
    <div class="intention-saved" id="intentionSaved" onclick="editIntention()">
      <div class="intention-saved-text" id="intentionSavedText"></div>
      <div class="intention-saved-hint">點擊修改</div>
    </div>
  </div>

  <!-- Tasks -->
  <div class="section-card tasks-card">
    <div class="section-title">✅ 今日最重要的三件事</div>
    <div class="task-list" id="taskList"></div>
  </div>

  <!-- Chakra energy -->
  <div class="section-card chakra-card">
    <div class="section-title">🌈 今日脈輪能量</div>
    <div class="chakra-energy-wrap">
      <div class="chakra-color-bar" id="chakraBar"></div>
      <div class="chakra-energy-content">
        <div class="chakra-name-row">
          <span class="chakra-name-big" id="chakraName"></span>
          <span class="chakra-keywords-sm" id="chakraKeywords"></span>
        </div>
        <div class="chakra-affirmation" id="chakraAffirmation"></div>
      </div>
    </div>
  </div>

  <!-- Start button -->
  <div class="start-wrap">
    <button class="start-btn" id="startBtn" onclick="startDay()">🌅 開始美好的一天</button>
    <div class="streak-text" id="streakText"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="/js/dream-data.js"></script>
<script>
// ── Firebase ──
const firebaseConfig = {
  apiKey: "AIzaSyDEWMEv-0vMixLtjPx2ZPiUzHgtW7cg1ug",
  authDomain: "oz-workspace.firebaseapp.com",
  projectId: "oz-workspace",
  storageBucket: "oz-workspace.firebasestorage.app",
  messagingSenderId: "128483648899",
  appId: "1:128483648899:web:56b21e29cd2c677f7002b6"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

let currentUserName = '';
auth.onAuthStateChanged(user => {
  if (user) {
    currentUserName = user.displayName || user.email || '';
    document.getElementById('headerUserName').textContent = currentUserName;
    document.getElementById('greetingText').textContent = '早安，' + currentUserName;
  }
});
function logout() {
  auth.signOut().then(() => location.href = '/login.html');
}

// ── Starfield ──
(function() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 70; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*5}s;--delay:${Math.random()*6}s`;
    c.appendChild(s);
  }
})();

// ── RUNES data ──
const RUNES = [
  { symbol:'ᚠ', name:'Fehu',     zh:'費胡・財富',   core:'費胡象徵流動的財富與繁榮，代表原始的生命力量，以及透過努力所換來的豐盛成果。', insight:'豐盛的契機已悄然靠近，關鍵在於你是否準備好敞開雙手去接納。', action:'積極管理你的資源——無論是金錢、時間還是精力。分享你所擁有的，流動的能量才能帶來更大的回報。' },
  { symbol:'ᚢ', name:'Uruz',     zh:'烏魯茲・原力', core:'烏魯茲象徵原始的野牛之力，代表蠻荒的力量、健康與生命力。', insight:'你內在有一股強大的力量尚未完全釋放，宇宙鼓勵你信任自己的直覺與體能，勇敢面對挑戰。', action:'鍛鍊身體，照顧健康，讓自己保持在最佳狀態。勇氣與耐力是現在最需要的資糧。' },
  { symbol:'ᚦ', name:'Thurisaz', zh:'瑟里薩茲・荊棘',core:'瑟里薩茲是雷神索爾之鎚，象徵守護、衝突與考驗。它是一道尖銳的荊棘，也是保護自我的武器。', insight:'你正面臨或即將面臨一場考驗，這是宇宙為你量身打造的淬鍊，通過之後你將更為強大。', action:'不要逃避衝突，以清醒的頭腦分析障礙，然後果斷出擊。你的邊界需要被清楚建立與守護。' },

// ── Chakra day mapping (Mon=0...Sun=6) ──
const DAY_CHAKRA = ['root','sacral','solar','heart','throat','third_eye','crown'];

// ── Date helpers ──
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function dateToday() { return new Date(); }

// ── Clock & date ──
const WEEK_ZH = ['週日','週一','週二','週三','週四','週五','週六'];
const MONTH_ZH = ['一','二','三','四','五','六','七','八','九','十','十一','十二'];

function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('greetingClock').textContent = `${h}:${m}:${s}`;
}

function setDate() {
  const now = new Date();
  const yr = now.getFullYear();
  const mo = now.getMonth() + 1;
  const dy = now.getDate();
  const wk = WEEK_ZH[now.getDay()];
  document.getElementById('greetingDate').textContent =
    `${yr}年${mo}月${dy}日　${wk}`;
}

// ── Daily rune (based on date, same for everyone) ──
function setDailyRune() {
  const now = new Date();
  const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
  const rune = RUNES[dayOfYear % RUNES.length];
  document.getElementById('runeSymbol').textContent = rune.symbol;
  document.getElementById('runeName').textContent   = rune.name;
  document.getElementById('runeZh').textContent     = rune.zh;
  document.getElementById('runeCore').textContent   = rune.core;
  document.getElementById('runeInsight').textContent = rune.insight;
  document.getElementById('runeAction').textContent  = rune.action;
}

function toggleRuneDetail() {
  const detail = document.getElementById('runeDetail');
  const btn    = document.getElementById('revealBtnText');
  const open   = detail.classList.toggle('open');
  btn.textContent = open ? '收起 ▴' : '展開今日啟示 ▾';
}

// ── Chakra energy (based on day of week, fixed affirmation by date) ──
function setChakraEnergy() {
  const now = new Date();
  const dow = now.getDay(); // 0=Sun
  // Mon=0...Sun=6 mapping: getDay() 1→Mon, 0→Sun
  const chakraIdx = dow === 0 ? 6 : dow - 1;
  const chakraId  = DAY_CHAKRA[chakraIdx];
  const card      = chakraCards[chakraId];

  // Fixed affirmation: use day-of-year as seed
  const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
  const affirmation = card.affirmations[dayOfYear % card.affirmations.length];

  document.getElementById('chakraBar').style.background = card.color;
  document.getElementById('chakraName').textContent     = card.chakra;
  document.getElementById('chakraName').style.color     = card.color;
  document.getElementById('chakraKeywords').textContent = card.keywords;
  document.getElementById('chakraAffirmation').textContent = `「${affirmation}」`;
}

// ── Intention ──
function intentionKey() { return `morning_intention_${todayStr()}`; }

function loadIntention() {
  const saved = localStorage.getItem(intentionKey());
  const input  = document.getElementById('intentionInput');
  const savedEl = document.getElementById('intentionSaved');
  const savedTxt = document.getElementById('intentionSavedText');
  if (saved) {
    input.style.display = 'none';
    savedEl.classList.add('visible');
    savedTxt.textContent = '「' + saved + '」';
  } else {
    input.style.display = 'block';
    savedEl.classList.remove('visible');
  }
}

function saveIntention(val) {
  if (!val.trim()) return;
  localStorage.setItem(intentionKey(), val.trim());
  loadIntention();
}

function editIntention() {
  localStorage.removeItem(intentionKey());
  loadIntention();
  setTimeout(() => document.getElementById('intentionInput').focus(), 50);
}

document.getElementById('intentionInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    saveIntention(e.target.value);
    e.target.blur();
  }
});
document.getElementById('intentionInput').addEventListener('blur', e => {
  if (e.target.value.trim()) saveIntention(e.target.value);
});

// ── Tasks ──
function tasksKey() { return `morning_tasks_${todayStr()}`; }

function loadTasks() {
  return JSON.parse(localStorage.getItem(tasksKey()) || '[{"text":"","done":false},{"text":"","done":false},{"text":"","done":false}]');
}

function saveTasks(tasks) {
  localStorage.setItem(tasksKey(), JSON.stringify(tasks));
}

function renderTasks() {
  const tasks = loadTasks();
  const list  = document.getElementById('taskList');
  list.innerHTML = '';
  tasks.forEach((task, i) => {
    const item = document.createElement('div');
    item.className = 'task-item';

    const cb = document.createElement('div');
    cb.className = 'task-checkbox' + (task.done ? ' done' : '');
    cb.addEventListener('click', () => {
      const t = loadTasks();
      t[i].done = !t[i].done;
      saveTasks(t);
      renderTasks();
    });

    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'task-input' + (task.done ? ' done' : '');
    inp.value     = task.text;
    inp.placeholder = `第 ${i + 1} 件重要的事`;
    inp.maxLength = 60;
    inp.addEventListener('input', () => {
      const t = loadTasks();
      t[i].text = inp.value;
      saveTasks(t);
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') inp.blur();
    });

    item.appendChild(cb);
    item.appendChild(inp);
    list.appendChild(item);
  });
}

// ── Streak ──
function ritualKey(dateStr) { return `morning_ritual_${dateStr}`; }

function getStreak() {
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (localStorage.getItem(ritualKey(key))) {
      streak++;
    } else {
      break;
    }
  }
  return streak;
}

function updateStreak() {
  const n = getStreak();
  const el = document.getElementById('streakText');
  if (n === 0) {
    el.innerHTML = '今天是你第一次晨間儀式，開始美好的習慣吧';
  } else {
    el.innerHTML = `你已連續完成 <span class="streak-num">${n}</span> 天的晨間儀式`;
  }
}

// ── Start day ──
function startDay() {
  const btn = document.getElementById('startBtn');
  btn.classList.add('fired');
  btn.disabled = true;

  // Record ritual
  localStorage.setItem(ritualKey(todayStr()), '1');

  showToast('🌅 美好的一天開始了！');

  setTimeout(() => {
    location.href = '/index.html';
  }, 2800);
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Init ──
setDate();
updateClock();
setInterval(updateClock, 1000);
setDailyRune();
setChakraEnergy();
loadIntention();
renderTasks();
updateStreak();
</script>
