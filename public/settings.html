<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>帳號設定 — 文章收藏</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f0;
      --surface: #ffffff;
      --border: #e2e2dc;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    header h1 { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
    .btn-back {
      padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; cursor: pointer; font-size: .85rem;
      font-family: inherit; font-weight: 600; transition: background .15s;
      margin-left: auto; text-decoration: none; color: var(--text);
      display: inline-flex; align-items: center;
    }
    .btn-back:hover { background: var(--bg); }

    .main { max-width: 560px; margin: 0 auto; padding: 32px 16px; }

    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .section-card h2 {
      font-size: .95rem; font-weight: 600; margin-bottom: 18px;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em;
    }
    .user-email { font-size: .88rem; color: var(--text-muted); margin-bottom: 18px; }
    .user-email span { font-weight: 600; color: var(--text); }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: .82rem; font-weight: 600; margin-bottom: 5px; color: var(--text-muted); }
    input {
      border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; font-size: .95rem; font-family: inherit;
      color: var(--text); background: var(--surface); width: 100%;
      transition: border-color .15s; outline: none;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    .btn-primary {
      padding: 9px 20px; border-radius: 8px; border: none;
      cursor: pointer; font-size: .9rem; font-weight: 600;
      font-family: inherit; transition: background .15s;
      background: var(--accent); color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-danger-outline {
      padding: 9px 20px; border-radius: 8px; border: 1px solid var(--danger);
      cursor: pointer; font-size: .9rem; font-weight: 600;
      font-family: inherit; transition: background .15s;
      background: transparent; color: var(--danger);
    }
    .btn-danger-outline:hover { background: #fef2f2; }
    .msg { font-size: .85rem; margin-top: 12px; min-height: 20px; }
    .msg.error { color: var(--danger); }
    .msg.success { color: var(--success); }
    .form-actions { display: flex; justify-content: flex-end; margin-top: 4px; }
  </style>
</head>
<body>

<header>
  <h1>📚 文章收藏</h1>
  <a class="btn-back" href="/">← 返回</a>
</header>

<div class="main">

  <!-- Profile section -->
  <div class="section-card">
    <h2>帳號資訊</h2>
    <div class="user-email">電子郵件：<span id="userEmail">—</span></div>
    <form onsubmit="saveProfile(event)">
      <div class="form-group">
        <label>顯示名稱</label>
        <input type="text" id="displayName" placeholder="輸入顯示名稱" autocomplete="name">
      </div>
      <div class="msg" id="profileMsg"></div>
      <div class="form-actions">
        <button class="btn-primary" type="submit" id="profileBtn">儲存名稱</button>
      </div>
    </form>
  </div>

  <!-- Change password section -->
  <div class="section-card">
    <h2>修改密碼</h2>
    <form onsubmit="changePassword(event)">
      <div class="form-group">
        <label>目前密碼</label>
        <input type="password" id="currentPassword" placeholder="輸入目前密碼" autocomplete="current-password">
      </div>
      <div class="form-group">
        <label>新密碼（至少 6 個字元）</label>
        <input type="password" id="newPassword" placeholder="輸入新密碼" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>確認新密碼</label>
        <input type="password" id="confirmPassword" placeholder="再次輸入新密碼" autocomplete="new-password">
      </div>
      <div class="msg" id="passwordMsg"></div>
      <div class="form-actions">
        <button class="btn-primary" type="submit" id="passwordBtn">更新密碼</button>
      </div>
    </form>
  </div>

  <!-- Logout section -->
  <div class="section-card">
    <h2>登出</h2>
    <div class="form-actions">
      <button class="btn-danger-outline" onclick="logout()">登出帳號</button>
    </div>
  </div>

</div>

<script>
let currentUser = null;

async function loadUser() {
  const res = await fetch('/api/auth/me');
  if (!res.ok) { window.location.replace('/login.html'); return; }
  currentUser = await res.json();
  document.getElementById('userEmail').textContent = currentUser.email;
  document.getElementById('displayName').value = currentUser.display_name || '';
}

async function saveProfile(e) {
  e.preventDefault();
  const display_name = document.getElementById('displayName').value.trim();
  const msgEl = document.getElementById('profileMsg');
  const btn = document.getElementById('profileBtn');

  if (!display_name) { msgEl.className = 'msg error'; msgEl.textContent = '顯示名稱不能為空'; return; }

  btn.disabled = true;
  btn.textContent = '儲存中…';
  msgEl.textContent = '';

  try {
    const res = await fetch('/api/auth/settings', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ display_name }),
    });
    const data = await res.json();
    if (res.ok) {
      currentUser = data;
      msgEl.className = 'msg success';
      msgEl.textContent = '顯示名稱已更新';
    } else {
      msgEl.className = 'msg error';
      msgEl.textContent = data.error || '更新失敗';
    }
  } catch {
    msgEl.className = 'msg error';
    msgEl.textContent = '網路錯誤，請稍後再試';
  } finally {
    btn.disabled = false;
    btn.textContent = '儲存名稱';
  }
}

async function changePassword(e) {
  e.preventDefault();
  const current_password = document.getElementById('currentPassword').value;
  const new_password = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;
  const msgEl = document.getElementById('passwordMsg');
  const btn = document.getElementById('passwordBtn');

  if (!current_password || !new_password) {
    msgEl.className = 'msg error'; msgEl.textContent = '請填寫所有欄位'; return;
  }
  if (new_password !== confirm) {
    msgEl.className = 'msg error'; msgEl.textContent = '兩次新密碼輸入不一致'; return;
  }

  btn.disabled = true;
  btn.textContent = '更新中…';
  msgEl.textContent = '';

  try {
    const res = await fetch('/api/auth/settings', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ current_password, new_password }),
    });
    const data = await res.json();
    if (res.ok) {
      msgEl.className = 'msg success';
      msgEl.textContent = '密碼已更新';
      document.getElementById('currentPassword').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('confirmPassword').value = '';
    } else {
      msgEl.className = 'msg error';
      msgEl.textContent = data.error || '更新失敗';
    }
  } catch {
    msgEl.className = 'msg error';
    msgEl.textContent = '網路錯誤，請稍後再試';
  } finally {
    btn.disabled = false;
    btn.textContent = '更新密碼';
  }
}

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.replace('/login.html');
}

loadUser();
</script>
</body>
</html>
