<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌈 彩虹脈輪卡</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08091a;
      --bg2: #0d0f26;
      --surface: #111328;
      --border: #2a2d4a;
      --text: #dde2f0;
      --text-muted: #7080a0;
      --silver: #a8b4cc;
      --rainbow: linear-gradient(135deg, #e74c3c, #e67e22, #f1c40f, #27ae60, #2980b9, #8e44ad, #9b59b6);
      --rainbow-anim: linear-gradient(270deg, #e74c3c, #e67e22, #f1c40f, #27ae60, #2980b9, #8e44ad, #9b59b6, #e74c3c);
    }

    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes rainbow-shift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes flip-in {
      0%   { transform: rotateY(90deg) scale(.85); opacity: 0; }
      60%  { transform: rotateY(-6deg) scale(1.02); opacity: 1; }
      100% { transform: rotateY(0deg) scale(1); }
    }
    @keyframes star-twinkle {
      0%,100% { opacity: .2; }
      50%      { opacity: 1; }
    }
    @keyframes pulse-rainbow {
      0%,100% { box-shadow: 0 0 20px rgba(142,68,173,.4), 0 0 60px rgba(39,174,96,.2); }
      33%      { box-shadow: 0 0 30px rgba(231,76,60,.4), 0 0 80px rgba(230,126,34,.2); }
      66%      { box-shadow: 0 0 30px rgba(41,128,185,.4), 0 0 80px rgba(142,68,173,.2); }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Starfield ── */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; width: 2px; height: 2px;
      background: #fff; border-radius: 50%;
      animation: star-twinkle var(--dur,3s) ease-in-out infinite;
      animation-delay: var(--delay,0s);
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(180deg, rgba(8,9,26,.98), rgba(8,9,26,.9));
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex; align-items: center; gap: 14px;
      backdrop-filter: blur(12px);
    }
    header h1 {
      font-size: 1.15rem; font-weight: 700;
      background: var(--rainbow-anim);
      background-size: 400% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: rainbow-shift 6s ease infinite;
      letter-spacing: .1em; white-space: nowrap;
    }
    .header-right {
      margin-left: auto; display: flex; align-items: center;
      gap: 8px; flex-wrap: wrap;
    }
    .nav-link {
      text-decoration: none; font-size: .8rem; font-weight: 600;
      color: var(--text-muted); padding: 4px 10px;
      border-radius: 999px; border: 1px solid var(--border);
      transition: color .2s, border-color .2s; white-space: nowrap;
    }
    .nav-link:hover { color: var(--silver); border-color: #4a5070; }
    .user-name { font-size: .82rem; color: var(--text-muted); white-space: nowrap; }
    .btn-hdr {
      padding: 4px 11px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; cursor: pointer; font-size: .8rem;
      font-family: inherit; font-weight: 600; color: var(--text-muted);
      transition: border-color .2s, color .2s; white-space: nowrap;
    }
    .btn-hdr:hover { border-color: #4a5070; color: var(--silver); }

    /* ── Main ── */
    .main {
      position: relative; z-index: 1;
      max-width: 720px; margin: 0 auto;
      padding: 44px 20px 80px;
      display: flex; flex-direction: column;
      align-items: center; gap: 28px;
    }

    /* ── Intro card ── */
    .intro-card {
      width: 100%;
      background: linear-gradient(135deg, rgba(20,22,45,.9), rgba(13,15,38,.9));
      border: 1px solid var(--border);
      border-radius: 18px; padding: 28px 32px;
      text-align: center;
      animation: fade-up .6s ease both;
    }
    .intro-title {
      font-size: 2.1rem; font-weight: 700;
      background: var(--rainbow-anim);
      background-size: 400% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: rainbow-shift 6s ease infinite;
      letter-spacing: .12em; margin-bottom: 12px;
    }
    .intro-sub {
      font-size: .95rem; color: var(--silver);
      line-height: 1.85; letter-spacing: .06em; margin-bottom: 10px;
    }
    .intro-credit {
      font-size: .75rem; color: var(--text-muted);
      letter-spacing: .06em; font-style: italic;
    }

    /* ── Mode cards ── */
    .mode-section {
      width: 100%;
      animation: fade-up .6s .08s ease both;
    }
    .mode-label {
      font-size: .72rem; font-weight: 700;
      color: var(--text-muted); letter-spacing: .2em;
      text-transform: uppercase; margin-bottom: 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .mode-label::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }
    .mode-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .mode-btn {
      background: linear-gradient(160deg, #151830, #0d0f26);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 12px;
      cursor: pointer; text-align: center;
      transition: border-color .2s, box-shadow .2s, transform .15s;
      font-family: inherit; color: var(--text);
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      outline: none; -webkit-tap-highlight-color: transparent;
    }
    .mode-btn:hover {
      border-color: #4a5070;
      box-shadow: 0 0 20px rgba(255,255,255,.05);
      transform: translateY(-2px);
    }
    .mode-btn.active {
      border-color: transparent;
      background: linear-gradient(160deg, #1a1d3a, #111328);
      box-shadow: 0 0 0 2px #8e44ad, 0 0 24px rgba(142,68,173,.3);
    }
    .mode-btn.active .mode-icon { filter: none; }
    .mode-icon { font-size: 1.8rem; }
    .mode-name {
      font-size: .82rem; font-weight: 700;
      letter-spacing: .06em;
    }
    .mode-desc {
      font-size: .72rem; color: var(--text-muted);
      line-height: 1.5; letter-spacing: .04em;
    }

    /* ── Chakra picker ── */
    .chakra-picker {
      width: 100%; display: none;
      animation: fade-up .3s ease both;
    }
    .chakra-picker.visible { display: block; }
    .chakra-picker-label {
      font-size: .72rem; font-weight: 700;
      color: var(--text-muted); letter-spacing: .2em;
      text-transform: uppercase; margin-bottom: 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .chakra-picker-label::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }
    .chakra-circles {
      display: flex; flex-wrap: wrap;
      gap: 12px; justify-content: center;
    }
    .chakra-circle {
      display: flex; flex-direction: column;
      align-items: center; gap: 6px;
      cursor: pointer;
    }
    .circle-dot {
      width: 46px; height: 46px;
      border-radius: 50%;
      border: 2px solid transparent;
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem; font-weight: 700;
      color: #fff; letter-spacing: .02em;
      transition: transform .2s, box-shadow .2s;
      text-shadow: 0 1px 3px rgba(0,0,0,.5);
    }
    .chakra-circle:hover .circle-dot { transform: scale(1.12); }
    .chakra-circle.selected .circle-dot {
      border-color: #fff;
      box-shadow: 0 0 16px rgba(255,255,255,.4);
      transform: scale(1.15);
    }
    .circle-name {
      font-size: .68rem; color: var(--text-muted);
      letter-spacing: .04em; text-align: center;
    }
    .chakra-circle.selected .circle-name { color: var(--silver); }

    /* ── Draw button ── */
    .draw-wrap {
      width: 100%; display: flex;
      flex-direction: column; align-items: center;
      gap: 10px;
      animation: fade-up .6s .16s ease both;
    }
    .draw-btn {
      padding: 14px 52px;
      border-radius: 999px;
      border: none;
      background: var(--rainbow-anim);
      background-size: 400% auto;
      animation: rainbow-shift 6s ease infinite;
      color: #fff; font-size: 1rem; font-weight: 700;
      letter-spacing: .12em; cursor: pointer;
      font-family: inherit;
      transition: transform .15s, box-shadow .2s;
      box-shadow: 0 4px 24px rgba(142,68,173,.35);
      animation: rainbow-shift 6s ease infinite, pulse-rainbow 4s ease-in-out infinite;
    }
    .draw-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 36px rgba(142,68,173,.55);
    }
    .draw-btn:active { transform: scale(.97); }
    .draw-btn:disabled {
      opacity: .5; cursor: not-allowed; transform: none;
    }
    .draw-hint { font-size: .8rem; color: var(--text-muted); letter-spacing: .08em; }

    /* ── Result area ── */
    .result-area {
      width: 100%; display: none;
      flex-direction: column; align-items: center; gap: 20px;
    }
    .result-area.visible { display: flex; }

    /* ── Single card ── */
    .chakra-card {
      width: 100%;
      background: linear-gradient(160deg, #151830 0%, #0d0f26 60%, #0a0c1e 100%);
      border-radius: 20px;
      padding: 0;
      overflow: hidden;
      animation: flip-in .7s cubic-bezier(.34,1.56,.64,1) forwards;
      display: flex;
    }
    .card-bar {
      width: 6px; flex-shrink: 0;
    }
    .card-body {
      flex: 1; padding: 32px 28px 36px;
    }
    .card-chakra-name {
      font-size: 1.55rem; font-weight: 700;
      letter-spacing: .15em; margin-bottom: 6px;
    }
    .card-keywords {
      font-size: .8rem; letter-spacing: .08em;
      opacity: .75; margin-bottom: 28px;
    }
    .card-divider {
      height: 1px; margin-bottom: 24px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
    }
    .card-affirmation {
      font-size: 1.18rem; font-style: italic;
      line-height: 1.8; letter-spacing: .06em;
      color: #eef0f8; text-align: center;
    }

    /* ── Three-card layout ── */
    .three-card-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .three-card-wrap {
      display: flex; flex-direction: column; gap: 8px;
    }
    .card-role-label {
      text-align: center;
      font-size: .75rem; font-weight: 700;
      letter-spacing: .2em; color: var(--text-muted);
      text-transform: uppercase;
    }
    .three-chakra-card {
      background: linear-gradient(160deg, #151830 0%, #0d0f26 60%, #0a0c1e 100%);
      border-radius: 16px;
      overflow: hidden;
      animation: flip-in .7s cubic-bezier(.34,1.56,.64,1) forwards;
      display: flex;
    }
    .three-chakra-card:nth-child(2) { animation-delay: .1s; }
    .three-chakra-card:nth-child(3) { animation-delay: .2s; }
    .three-card-wrap:nth-child(2) .three-chakra-card { animation-delay: .1s; }
    .three-card-wrap:nth-child(3) .three-chakra-card { animation-delay: .2s; }
    .three-card-body {
      flex: 1; padding: 18px 14px 20px;
    }
    .three-card-chakra {
      font-size: 1rem; font-weight: 700;
      letter-spacing: .1em; margin-bottom: 4px;
    }
    .three-card-keywords {
      font-size: .68rem; opacity: .65;
      letter-spacing: .06em; margin-bottom: 14px;
    }
    .three-card-affirmation {
      font-size: .82rem; font-style: italic;
      line-height: 1.75; color: #e8d5f0;
    }

    /* ── Again button ── */
    .again-btn {
      padding: 11px 40px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.2);
      background: transparent;
      color: var(--silver);
      font-size: .9rem; font-weight: 600;
      letter-spacing: .1em; cursor: pointer;
      font-family: inherit;
      transition: background .2s, border-color .2s;
      animation: fade-up .5s .5s both;
    }
    .again-btn:hover {
      background: rgba(255,255,255,.06);
      border-color: rgba(255,255,255,.35);
    }
    .again-btn:active { transform: scale(.97); }

    /* ── Today log ── */
    .today-section {
      width: 100%;
      animation: fade-up .6s .24s ease both;
    }
    .today-heading {
      font-size: .72rem; font-weight: 700;
      color: var(--text-muted); letter-spacing: .2em;
      text-transform: uppercase;
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px;
    }
    .today-heading::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }
    .today-list {
      display: flex; flex-direction: column; gap: 10px;
    }
    .today-item {
      background: linear-gradient(160deg, #141728, #0d0f26);
      border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      display: flex;
    }
    .today-bar { width: 4px; flex-shrink: 0; }
    .today-body { flex: 1; padding: 14px 16px; }
    .today-meta {
      font-size: .7rem; color: var(--text-muted);
      letter-spacing: .08em; margin-bottom: 5px;
    }
    .today-chakra {
      font-size: .88rem; font-weight: 700;
      letter-spacing: .08em; margin-bottom: 4px;
    }
    .today-affirmation {
      font-size: .83rem; color: var(--silver);
      line-height: 1.65; font-style: italic;
    }
    .today-empty {
      text-align: center; padding: 28px 20px;
      color: var(--text-muted); font-size: .85rem;
      letter-spacing: .08em;
      background: linear-gradient(160deg, #141728, #0d0f26);
      border: 1px solid var(--border); border-radius: 14px;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; right: 28px;
      background: #1a1d3a; color: var(--silver);
      border: 1px solid var(--border);
      padding: 10px 20px; border-radius: 10px;
      font-size: .85rem; opacity: 0;
      transition: opacity .3s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .mode-grid { grid-template-columns: 1fr; }
      .three-card-grid { grid-template-columns: 1fr; }
      .intro-title { font-size: 1.6rem; }
      .chakra-card { flex-direction: column; }
      .card-bar { width: 100%; height: 5px; }
      .card-body { padding: 24px 20px 28px; }
    }
    @media (max-width: 480px) {
      .chakra-circles { gap: 8px; }
      .circle-dot { width: 40px; height: 40px; font-size: .62rem; }
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<header>
  <h1>🌈 彩虹脈輪卡</h1>
  <div class="header-right">
    <a class="nav-link" href="/index.html">📰 文章收藏</a>
    <a class="nav-link" href="/bulletin.html">📢 公告欄</a>
    <a class="nav-link" href="/runes.html">🔮 神諭</a>
    <a class="nav-link" href="/dream.html">🌙 解夢</a>
    <a class="nav-link" href="/rainbow.html">🌈 彩虹卡</a>
    <a class="nav-link" href="/morning.html">🌅 晨間儀式</a>
    <a class="nav-link" href="/iching.html">☯ 易經占卜</a>
    <a class="nav-link" href="/pomodoro.html">🍅 番茄鐘</a>
    <span class="user-name" id="headerUserName"></span>
    <button class="btn-hdr" onclick="location.href='/settings.html'">設定</button>
    <button class="btn-hdr" onclick="logout()">登出</button>
  </div>
</header>

<div class="main">

  <!-- Intro -->
  <div class="intro-card">
    <div class="intro-title">🌈 彩虹脈輪卡</div>
    <p class="intro-sub">閉上眼睛，讓內心帶你找到此刻需要的訊息</p>
    <p class="intro-credit">參考 Doris Wenzel 彩虹卡精神，原創中文能量語句</p>
  </div>

  <!-- Mode selection -->
  <div class="mode-section">
    <div class="mode-label">選擇抽卡方式</div>
    <div class="mode-grid">
      <button class="mode-btn active" id="modeRandom" onclick="selectMode('random')">
        <span class="mode-icon">🎲</span>
        <span class="mode-name">隨機抽卡</span>
        <span class="mode-desc">從所有 245 句中<br>隨機抽取一張</span>
      </button>
      <button class="mode-btn" id="modeChakra" onclick="selectMode('chakra')">
        <span class="mode-icon">🎨</span>
        <span class="mode-name">選擇脈輪</span>
        <span class="mode-desc">點選脈輪顏色<br>從該輪抽取</span>
      </button>
      <button class="mode-btn" id="modeThree" onclick="selectMode('three')">
        <span class="mode-icon">🌟</span>
        <span class="mode-name">身心靈三卡</span>
        <span class="mode-desc">同時抽三張<br>身・心・靈</span>
      </button>
    </div>
  </div>

  <!-- Chakra picker (visible only in chakra mode) -->
  <div class="chakra-picker" id="chakraPicker">
    <div class="chakra-picker-label">選擇脈輪</div>
    <div class="chakra-circles" id="chakraCircles"></div>
  </div>

  <!-- Draw button -->
  <div class="draw-wrap">
    <button class="draw-btn" id="drawBtn" onclick="onDraw()">✨ 抽卡</button>
    <span class="draw-hint" id="drawHint">靜下心來，點擊抽卡</span>
  </div>

  <!-- Result area -->
  <div class="result-area" id="resultArea">
    <div id="resultContent"></div>
    <button class="again-btn" onclick="onDraw()">🔄 再抽一張</button>
  </div>

  <!-- Today's log -->
  <div class="today-section" id="todaySection">
    <div class="today-heading">今日牌陣記錄</div>
    <div class="today-list" id="todayList">
      <div class="today-empty">今天還沒有抽卡記錄</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="/js/dream-data.js"></script>
<script>
// ── Firebase init (auth only for header user display) ──
const firebaseConfig = {
  apiKey: "AIzaSyDEWMEv-0vMixLtjPx2ZPiUzHgtW7cg1ug",
  authDomain: "oz-workspace.firebaseapp.com",
  projectId: "oz-workspace",
  storageBucket: "oz-workspace.firebasestorage.app",
  messagingSenderId: "128483648899",
  appId: "1:128483648899:web:56b21e29cd2c677f7002b6"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('headerUserName').textContent = user.displayName || user.email || '';
  }
});
function logout() {
  auth.signOut().then(() => location.href = '/login.html');
}

// ── Starfield ──
(function() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:${Math.random()*5}s;opacity:${.2+Math.random()*.8}`;
    container.appendChild(s);
  }
})();

// ── Chakra config ──
const CHAKRA_ORDER = ['root','sacral','solar','heart','throat','third_eye','crown'];
const BODY_CHAKRAS  = ['root','sacral'];
const HEART_CHAKRAS = ['heart','throat'];
const SPIRIT_CHAKRAS = ['third_eye','crown'];

// ── State ──
let currentMode = 'random';
let selectedChakraId = null;

// ── Mode selection ──
function selectMode(mode) {
  currentMode = mode;
  ['random','chakra','three'].forEach(m => {
    document.getElementById('mode' + m.charAt(0).toUpperCase() + m.slice(1))
      .classList.toggle('active', m === mode);
  });
  const picker = document.getElementById('chakraPicker');
  picker.classList.toggle('visible', mode === 'chakra');

  const hints = {
    random: '靜下心來，點擊抽卡',
    chakra: '選擇脈輪後點擊抽卡',
    three: '深呼吸，為身・心・靈各抽一張'
  };
  document.getElementById('drawHint').textContent = hints[mode];

  if (mode !== 'chakra') selectedChakraId = null;
  hideResult();
}

// ── Build chakra circles ──
(function buildCircles() {
  const container = document.getElementById('chakraCircles');
  CHAKRA_ORDER.forEach(id => {
    const card = chakraCards[id];
    const wrap = document.createElement('div');
    wrap.className = 'chakra-circle';
    wrap.dataset.id = id;
    wrap.innerHTML = `
      <div class="circle-dot" style="background:${card.color};">${card.colorName}</div>
      <div class="circle-name">${card.chakra}</div>
    `;
    wrap.addEventListener('click', () => selectChakra(id));
    container.appendChild(wrap);
  });
})();

function selectChakra(id) {
  selectedChakraId = id;
  document.querySelectorAll('.chakra-circle').forEach(el => {
    el.classList.toggle('selected', el.dataset.id === id);
  });
}

// ── Core draw functions ──
function drawCard(chakraId = null) {
  const allCards = [];
  if (chakraId) {
    const c = chakraCards[chakraId];
    c.affirmations.forEach(a => allCards.push({ ...c, affirmation: a }));
  } else {
    CHAKRA_ORDER.forEach(cid => {
      const c = chakraCards[cid];
      c.affirmations.forEach(a => allCards.push({ ...c, affirmation: a }));
    });
  }
  const pick = allCards[Math.floor(Math.random() * allCards.length)];
  return {
    chakra: pick.chakra,
    color: pick.color,
    colorName: pick.colorName,
    keywords: pick.keywords,
    affirmation: pick.affirmation,
    id: pick.id
  };
}

function drawFromGroup(group) {
  const id = group[Math.floor(Math.random() * group.length)];
  return drawCard(id);
}

function drawThreeCards() {
  return [
    { role: '身', card: drawFromGroup(BODY_CHAKRAS) },
    { role: '心', card: drawFromGroup(HEART_CHAKRAS) },
    { role: '靈', card: drawFromGroup(SPIRIT_CHAKRAS) }
  ];
}

// ── Render ──
function renderSingleCard(card) {
  return `
    <div class="chakra-card">
      <div class="card-bar" style="background:${card.color};"></div>
      <div class="card-body">
        <div class="card-chakra-name" style="color:${card.color};">${card.chakra}</div>
        <div class="card-keywords" style="color:${card.color};">${card.keywords}</div>
        <div class="card-divider"></div>
        <div class="card-affirmation">「${card.affirmation}」</div>
      </div>
    </div>
  `;
}

function renderThreeCards(cards) {
  const items = cards.map(({ role, card }) => `
    <div class="three-card-wrap">
      <div class="card-role-label">${role}</div>
      <div class="three-chakra-card">
        <div class="card-bar" style="background:${card.color};width:5px;"></div>
        <div class="three-card-body">
          <div class="three-card-chakra" style="color:${card.color};">${card.chakra}</div>
          <div class="three-card-keywords" style="color:${card.color};">${card.keywords}</div>
          <div class="three-card-affirmation">「${card.affirmation}」</div>
        </div>
      </div>
    </div>
  `).join('');
  return `<div class="three-card-grid">${items}</div>`;
}

// ── Main draw handler ──
function onDraw() {
  if (currentMode === 'chakra' && !selectedChakraId) {
    showToast('請先選擇一個脈輪');
    return;
  }

  let html = '';
  let cardsToSave = [];

  if (currentMode === 'three') {
    const three = drawThreeCards();
    html = renderThreeCards(three);
    cardsToSave = three.map(({ role, card }) => ({ role, ...card }));
  } else {
    const chakraId = currentMode === 'chakra' ? selectedChakraId : null;
    const card = drawCard(chakraId);
    html = renderSingleCard(card);
    cardsToSave = [card];
  }

  const content = document.getElementById('resultContent');
  content.innerHTML = html;
  document.getElementById('resultArea').classList.add('visible');
  document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });

  cardsToSave.forEach(c => saveToday(c));
  renderTodayList();
}

function hideResult() {
  document.getElementById('resultArea').classList.remove('visible');
  document.getElementById('resultContent').innerHTML = '';
}

// ── localStorage today log ──
function todayKey() {
  const d = new Date();
  return `rainbow_today_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function saveToday(card) {
  const key = todayKey();
  const existing = JSON.parse(localStorage.getItem(key) || '[]');
  existing.push({
    time: new Date().toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' }),
    chakra: card.chakra,
    color: card.color,
    keywords: card.keywords,
    affirmation: card.affirmation,
    role: card.role || null
  });
  localStorage.setItem(key, JSON.stringify(existing));
  // clean old keys
  Object.keys(localStorage)
    .filter(k => k.startsWith('rainbow_today_') && k !== key)
    .forEach(k => localStorage.removeItem(k));
}

function loadToday() {
  const key = todayKey();
  return JSON.parse(localStorage.getItem(key) || '[]');
}

function renderTodayList() {
  const records = loadToday();
  const list = document.getElementById('todayList');
  if (records.length === 0) {
    list.innerHTML = '<div class="today-empty">今天還沒有抽卡記錄</div>';
    return;
  }
  list.innerHTML = [...records].reverse().map(r => `
    <div class="today-item">
      <div class="today-bar" style="background:${r.color};"></div>
      <div class="today-body">
        <div class="today-meta">${r.time}${r.role ? '　' + r.role : ''}</div>
        <div class="today-chakra" style="color:${r.color};">${r.chakra}　<span style="font-size:.72rem;opacity:.6;font-weight:400;">${r.keywords}</span></div>
        <div class="today-affirmation">「${r.affirmation}」</div>
      </div>
    </div>
  `).join('');
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Init ──
renderTodayList();
</script>
</body>
</html>
