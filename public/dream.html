<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>解夢 — 文章收藏</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08091a;
      --bg2: #0d0f26;
      --surface: #111328;
      --border: #2a2d4a;
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-dim: #7a6030;
      --silver: #a8b4cc;
      --text: #dde2f0;
      --text-muted: #7080a0;
      --glow: rgba(201,168,76,.35);
      --glow-strong: rgba(201,168,76,.7);
    }

    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes flip-in {
      0%   { transform: rotateY(90deg) scale(.85); opacity: 0; }
      60%  { transform: rotateY(-6deg) scale(1.02); opacity: 1; }
      100% { transform: rotateY(0deg) scale(1); }
    }
    @keyframes star-twinkle {
      0%,100% { opacity: .2; }
      50%      { opacity: 1; }
    }
    @keyframes spin-slow {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse-glow {
      0%,100% { box-shadow: 0 0 18px var(--glow), 0 0 50px var(--glow); }
      50%      { box-shadow: 0 0 36px var(--glow-strong), 0 0 90px var(--glow); }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Starfield ── */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; width: 2px; height: 2px;
      background: #fff; border-radius: 50%;
      animation: star-twinkle var(--dur,3s) ease-in-out infinite;
      animation-delay: var(--delay,0s);
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(180deg, rgba(8,9,26,.98), rgba(8,9,26,.9));
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex; align-items: center; gap: 14px;
      backdrop-filter: blur(12px);
    }
    .back-link {
      color: var(--gold-dim); text-decoration: none;
      font-size: .85rem; letter-spacing: .05em; transition: color .2s; white-space: nowrap;
    }
    .back-link:hover { color: var(--gold); }
    header h1 {
      font-size: 1.15rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dim));
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
      letter-spacing: .12em; white-space: nowrap;
    }
    .header-right {
      margin-left: auto; display: flex; align-items: center;
      gap: 8px; flex-wrap: wrap;
    }
    .nav-link {
      text-decoration: none; font-size: .8rem; font-weight: 600;
      color: var(--text-muted); padding: 4px 10px;
      border-radius: 999px; border: 1px solid var(--border);
      transition: color .2s, border-color .2s; white-space: nowrap;
    }
    .nav-link:hover { color: var(--silver); border-color: #4a5070; }
    .user-name { font-size: .82rem; color: var(--text-muted); white-space: nowrap; }
    .btn-hdr {
      padding: 4px 11px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; cursor: pointer; font-size: .8rem;
      font-family: inherit; font-weight: 600; color: var(--text-muted);
      transition: border-color .2s, color .2s; white-space: nowrap;
    }
    .btn-hdr:hover { border-color: #4a5070; color: var(--silver); }

    /* ── Main ── */
    .main {
      position: relative; z-index: 1;
      max-width: 780px; margin: 0 auto;
      padding: 44px 20px 80px;
      display: flex; flex-direction: column;
      align-items: center; gap: 28px;
    }

    /* ── Intro card ── */
    .intro-card {
      width: 100%;
      background: linear-gradient(135deg, rgba(20,22,45,.9), rgba(13,15,38,.9));
      border: 1px solid var(--border);
      border-radius: 18px; padding: 26px 32px;
      text-align: center;
      animation: fade-up .6s ease both;
    }
    .intro-deco {
      font-size: 1.4rem; color: var(--gold-dim);
      letter-spacing: .3em; margin-bottom: 10px; display: block;
    }
    .intro-title {
      font-size: 2rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 5s linear infinite;
      letter-spacing: .15em; margin-bottom: 12px;
    }
    .intro-sub {
      font-size: .9rem; color: var(--silver);
      line-height: 1.8; letter-spacing: .06em;
    }

    /* ── Input card ── */
    .input-card {
      width: 100%;
      background: linear-gradient(160deg, #151830, #0d0f26);
      border: 1px solid var(--border);
      border-radius: 18px; padding: 24px 28px;
      animation: fade-up .6s .08s ease both;
    }
    .input-label {
      font-size: .73rem; font-weight: 700;
      color: var(--gold-dim); letter-spacing: .18em;
      text-transform: uppercase; margin-bottom: 10px; display: block;
    }
    .dream-textarea {
      width: 100%; min-height: 160px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      color: var(--text); font-size: .92rem;
      font-family: inherit; line-height: 1.75;
      resize: vertical; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .dream-textarea:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px rgba(201,168,76,.1);
    }
    .dream-textarea::placeholder { color: var(--text-muted); }

    /* ── Method selection ── */
    .method-card {
      width: 100%;
      background: linear-gradient(160deg, #151830, #0d0f26);
      border: 1px solid var(--border);
      border-radius: 18px; padding: 22px 28px;
      animation: fade-up .6s .16s ease both;
    }
    .method-card-title {
      font-size: .73rem; font-weight: 700;
      color: var(--gold-dim); letter-spacing: .18em;
      text-transform: uppercase; margin-bottom: 14px;
    }
    .method-options { display: flex; flex-direction: column; gap: 10px; }
    .method-option {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 14px 16px; border-radius: 12px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color .2s, background .2s;
      user-select: none;
    }
    .method-option:hover { border-color: var(--gold-dim); }
    .method-option.selected {
      border-color: var(--gold);
      background: rgba(201,168,76,.07);
      box-shadow: 0 0 12px rgba(201,168,76,.08);
    }
    .method-option input[type=checkbox] {
      accent-color: var(--gold);
      width: 17px; height: 17px;
      margin-top: 2px; flex-shrink: 0; cursor: pointer;
    }
    .method-icon { font-size: 1.4rem; flex-shrink: 0; line-height: 1.2; }
    .method-info { flex: 1; }
    .method-name {
      font-size: .95rem; font-weight: 700;
      color: var(--gold-light); letter-spacing: .06em; margin-bottom: 3px;
    }
    .method-desc { font-size: .82rem; color: var(--text-muted); line-height: 1.5; }

    /* ── Submit button ── */
    .submit-wrap {
      animation: fade-up .6s .24s ease both;
    }
    .submit-btn {
      padding: 14px 48px; border-radius: 999px;
      border: 2px solid var(--gold);
      background: linear-gradient(135deg, rgba(201,168,76,.18), rgba(201,168,76,.04));
      color: var(--gold-light);
      font-size: 1rem; font-weight: 700; letter-spacing: .14em;
      cursor: pointer; font-family: inherit;
      transition: background .25s, box-shadow .25s, transform .15s;
      animation: pulse-glow 3s ease-in-out infinite;
    }
    .submit-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, rgba(201,168,76,.32), rgba(201,168,76,.12));
      box-shadow: 0 0 48px var(--glow-strong);
      transform: translateY(-2px);
      animation: none;
    }
    .submit-btn:disabled {
      opacity: .65; cursor: not-allowed;
      transform: none; animation: none;
      box-shadow: 0 0 12px var(--glow);
    }

    /* ── Loading ── */
    .loading-area {
      display: none; flex-direction: column;
      align-items: center; gap: 16px; padding: 20px 0;
      animation: fade-up .4s ease both;
    }
    .loading-area.visible { display: flex; }
    .loading-rune {
      font-size: 3.2rem; color: var(--gold);
      display: inline-block;
      animation: spin-slow 2s linear infinite;
      text-shadow: 0 0 24px var(--glow-strong);
    }
    .loading-text {
      font-size: .88rem; color: var(--text-muted);
      letter-spacing: .12em;
    }

    /* ── Result area ── */
    .result-area { display: none; width: 100%; }
    .result-area.visible { display: block; }

    .result-heading {
      font-size: .73rem; font-weight: 700;
      color: var(--gold-dim); letter-spacing: .2em; text-transform: uppercase;
      display: flex; align-items: center; gap: 12px; margin-bottom: 18px;
    }
    .result-heading::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    .result-grid {
      display: grid; grid-template-columns: 1fr; gap: 22px;
    }
    .result-grid.dual { grid-template-columns: 1fr 1fr; }

    .result-card {
      background: linear-gradient(160deg, #151830 0%, #0d0f26 60%, #0a0c1e 100%);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 32px 28px 28px;
      position: relative; overflow: hidden;
      animation: flip-in .7s cubic-bezier(.34,1.56,.64,1) both;
    }
    .result-card::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,.08) 0%, transparent 65%);
      pointer-events: none; border-radius: 20px;
    }
    .result-card-title {
      font-size: .82rem; font-weight: 700;
      color: var(--gold); letter-spacing: .16em;
      text-transform: uppercase; margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(201,168,76,.2);
      display: flex; align-items: center; gap: 8px;
    }

    /* ── Rendered analysis text ── */
    .analysis-section-title {
      font-size: .85rem; font-weight: 700;
      color: var(--gold); letter-spacing: .1em;
      margin: 16px 0 7px;
      display: flex; align-items: center; gap: 8px;
    }
    .analysis-section-title:first-child { margin-top: 0; }
    .analysis-line {
      font-size: .9rem; line-height: 1.9; color: var(--silver);
    }
    .analysis-line strong {
      color: var(--gold-light); font-weight: 700;
    }
    .analysis-spacer { height: 5px; }
    .analysis-source {
      font-size: .72rem; color: var(--text-muted);
      letter-spacing: .06em; margin-top: -14px; margin-bottom: 12px;
      padding-left: 1px; opacity: .8;
    }
    .no-analysis {
      font-size: .88rem; color: var(--text-muted);
      text-align: center; padding: 24px 0;
      letter-spacing: .06em;
    }

    /* ── History section ── */
    .history-area {
      display: none; width: 100%;
      animation: fade-up .5s ease both;
    }
    .history-area.visible { display: block; }

    .history-heading {
      font-size: .73rem; font-weight: 700;
      color: var(--gold-dim); letter-spacing: .2em; text-transform: uppercase;
      display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
    }
    .history-heading::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    .history-list { display: flex; flex-direction: column; gap: 10px; }

    .history-item {
      background: linear-gradient(160deg, #141728, #0d0f26);
      border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      transition: border-color .2s;
    }
    .history-item:hover { border-color: var(--gold-dim); }

    .history-summary {
      padding: 14px 18px; cursor: pointer;
      display: flex; align-items: flex-start; gap: 12px;
    }
    .history-meta {
      flex: 1; min-width: 0;
    }
    .history-date {
      font-size: .72rem; color: var(--text-muted);
      letter-spacing: .08em; margin-bottom: 4px;
    }
    .history-preview {
      font-size: .88rem; color: var(--silver);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      line-height: 1.4;
    }
    .history-tags { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
    .history-tag {
      font-size: .68rem; font-weight: 700; letter-spacing: .08em;
      padding: 2px 8px; border-radius: 999px;
      background: rgba(201,168,76,.12); color: var(--gold-dim);
      border: 1px solid rgba(201,168,76,.2);
    }
    .history-toggle {
      font-size: .8rem; color: var(--text-muted);
      flex-shrink: 0; margin-top: 2px; line-height: 1;
      transition: transform .2s;
    }
    .history-item.open .history-toggle { transform: rotate(180deg); }

    .history-detail {
      display: none; padding: 0 18px 16px;
      border-top: 1px solid rgba(42,45,74,.7);
    }
    .history-item.open .history-detail { display: block; }
    .history-detail-inner { padding-top: 14px; }

    .history-full-dream {
      font-size: .84rem; color: var(--text-muted);
      line-height: 1.75; white-space: pre-wrap; word-break: break-word;
      margin-bottom: 16px; padding: 12px 14px;
      background: rgba(255,255,255,.025);
      border-radius: 8px; border: 1px solid rgba(42,45,74,.6);
    }

    .history-result-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .history-tab-btn {
      padding: 4px 14px; border-radius: 999px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-muted); font-size: .76rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all .2s;
    }
    .history-tab-btn.active {
      border-color: var(--gold-dim); color: var(--gold);
      background: rgba(201,168,76,.08);
    }
    .history-result-panel { display: none; }
    .history-result-panel.active { display: block; }

    .history-empty {
      text-align: center; padding: 32px 20px;
      color: var(--text-muted); font-size: .85rem; letter-spacing: .08em;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; right: 28px;
      background: #1a1d3a; color: var(--silver);
      border: 1px solid var(--border);
      padding: 10px 20px; border-radius: 10px;
      font-size: .85rem; opacity: 0;
      transition: opacity .3s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 680px) {
      .result-grid.dual { grid-template-columns: 1fr; }
      .main { padding: 32px 14px 60px; }
      .intro-card { padding: 22px 18px; }
      .input-card, .method-card, .result-card { padding: 20px 16px; }
      .submit-btn { padding: 12px 36px; }
    }
  </style>
</head>
<body>

<!-- Starfield -->
<div class="stars" id="stars"></div>

<header>
  <h1>🌙 解夢</h1>
  <div class="header-right">
    <a class="nav-link" href="/index.html">📰 文章收藏</a>
    <a class="nav-link" href="/bulletin.html">📢 公告欄</a>
    <a class="nav-link" href="/runes.html">🔮 神諭</a>
    <a class="nav-link" href="/dream.html">🌙 解夢</a>
    <a class="nav-link" href="/rainbow.html">🌈 彩虹卡</a>
    <a class="nav-link" href="/morning.html">🌅 晨間儀式</a>
    <a class="nav-link" href="/iching.html">☯ 易經占卜</a>
    <span class="user-name" id="headerUserName"></span>
    <button class="btn-hdr" onclick="location.href='/settings.html'">設定</button>
    <button class="btn-hdr" onclick="logout()">登出</button>
  </div>
</header>

<div class="main">

  <!-- Intro -->
  <div class="intro-card">
    <span class="intro-deco">☽ ✦ ☾</span>
    <div class="intro-title">🌙 解夢</div>
    <p class="intro-sub">
      在靜謐的夜裡，讓古老的智慧為你解讀夢境的訊息<br>
      易經觀天地之象，榮格探內在幽徑
    </p>
  </div>

  <!-- Dream text input -->
  <div class="input-card">
    <label class="input-label" for="dreamInput">夢境描述</label>
    <textarea
      class="dream-textarea"
      id="dreamInput"
      placeholder="描述你的夢境……場景、人物、感受、顏色，&#10;任何你記得的細節都可以寫下來"
    ></textarea>
  </div>

  <!-- Method selection -->
  <div class="method-card">
    <div class="method-card-title">選擇解夢方式（可複選）</div>
    <div class="method-options">
      <label class="method-option" id="opt-iching" onclick="toggleMethod('iching')">
        <input type="checkbox" id="method-iching" value="iching" onclick="event.stopPropagation()">
        <span class="method-icon">☯</span>
        <div class="method-info">
          <div class="method-name">易經</div>
          <div class="method-desc">從自然意象與卦象，讀取天地之道的啟示</div>
        </div>
      </label>
      <label class="method-option" id="opt-jung" onclick="toggleMethod('jung')">
        <input type="checkbox" id="method-jung" value="jung" onclick="event.stopPropagation()">
        <span class="method-icon">🧠</span>
        <div class="method-info">
          <div class="method-name">榮格</div>
          <div class="method-desc">探索原型與集體潛意識，照見內在尚未整合的自我</div>
        </div>
      </label>
    </div>
  </div>

  <!-- Submit -->
  <div class="submit-wrap">
    <button class="submit-btn" id="submitBtn" onclick="startAnalysis()">
      ✨ 開始解夢
    </button>
  </div>

  <!-- Loading -->
  <div class="loading-area" id="loadingArea">
    <span class="loading-rune">ᚷ</span>
    <div class="loading-text">古老智慧正在解讀你的夢境…</div>
  </div>

  <!-- Result area -->
  <div class="result-area" id="resultArea">
    <div class="result-heading">解夢結果</div>
    <div class="result-grid" id="resultGrid"></div>
  </div>

  <!-- History area (auth only) -->
  <div class="history-area" id="historyArea">
    <div class="history-heading">近期解夢記錄</div>
    <div class="history-list" id="historyList">
      <div class="history-empty">載入中…</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-functions-compat.js"></script>
<script src="/js/dream-data.js"></script>
<script>
// ── Firebase init ──
const firebaseConfig = {
  apiKey: "AIzaSyDEWMEv-0vMixLtjPx2ZPiUzHgtW7cg1ug",
  authDomain: "oz-workspace.firebaseapp.com",
  projectId: "oz-workspace",
  storageBucket: "oz-workspace.firebasestorage.app",
  messagingSenderId: "128483648899",
  appId: "1:128483648899:web:56b21e29cd2c677f7002b6"
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db   = firebase.firestore();
const fns  = firebase.functions();

// ── Emulator detection ──
if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
  firebase.functions().useEmulator('localhost', 5001);
  firebase.firestore().useEmulator('localhost', 8080);
}

const dreamAnalysisFn = fns.httpsCallable('dreamAnalysis', { timeout: 120000 });

// ── State ──
let currentUser = null;

// ── Starfield ──
(function generateStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s  = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() < .2 ? 3 : 2;
    s.style.cssText =
      `left:${Math.random()*100}%;top:${Math.random()*100}%;`
      + `width:${sz}px;height:${sz}px;`
      + `--dur:${2+Math.random()*4}s;--delay:${Math.random()*5}s;`
      + `opacity:${.1+Math.random()*.35};`;
    c.appendChild(s);
  }
})();

// ── Auth ──
auth.onAuthStateChanged(user => {
  currentUser = user;
  if (user) {
    document.getElementById('headerUserName').textContent = user.displayName || user.email;
    document.getElementById('historyArea').classList.add('visible');
    loadHistory();
  }
});

async function logout() {
  await auth.signOut();
  window.location.replace('/login.html');
}

// ── Method toggle ──
function toggleMethod(id) {
  const chk  = document.getElementById(`method-${id}`);
  const card = document.getElementById(`opt-${id}`);
  chk.checked = !chk.checked;
  card.classList.toggle('selected', chk.checked);
}

// ── Helpers: rendering ──
function processInline(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
}

function renderChakraResonance(chakraResults) {
  if (!chakraResults || chakraResults.length === 0) return '';
  let html = `
    <div style="margin-top:24px; padding-top:20px;
      border-top:1px solid rgba(255,255,255,0.1);">
      <div style="font-size:0.85rem; color:#C9A0DC;
        letter-spacing:0.1em; margin-bottom:16px;">
        🌈 脈輪共鳴
      </div>`;
  chakraResults.forEach(r => {
    html += `
      <div style="display:flex; align-items:flex-start;
        gap:12px; margin-bottom:16px;">
        <div style="width:4px; min-height:60px;
          background:${r.color}; border-radius:2px;
          flex-shrink:0;"></div>
        <div>
          <div style="font-size:0.9rem; font-weight:600;
            color:${r.color}; margin-bottom:4px;">
            ${r.chakra}
            <span style="font-size:0.78rem;
              color:rgba(255,255,255,0.45); font-weight:400;">
              ${r.keywords}
            </span>
          </div>
          <div style="font-size:0.92rem; color:#E8D5F0;
            line-height:1.7; font-style:italic;">
            「${r.affirmation}」
          </div>
        </div>
      </div>`;
  });
  html += `</div>`;
  return html;
}

function renderAnalysis(text) {
  if (!text) {
    return '<div class="no-analysis">解析暫時無法取得，請稍後再試</div>';
  }

  let chakraHtml = '';
  let mainText = text;
  const chakraIdx = text.indexOf('___CHAKRA___');
  if (chakraIdx !== -1) {
    mainText = text.slice(0, chakraIdx);
    try {
      const chakraData = JSON.parse(text.slice(chakraIdx + 12));
      chakraHtml = renderChakraResonance(chakraData);
    } catch (e) { /* ignore parse errors */ }
  }

  const bodyHtml = mainText.split('\n').map(line => {
    const hMatch = line.match(/^#{1,3}\s+(.+)$/);
    if (hMatch) {
      return `<div class="analysis-section-title">${processInline(hMatch[1])}</div>`;
    }
    const srcMatch = line.match(/^>\s+(.+)$/);
    if (srcMatch) {
      return `<div class="analysis-source">${processInline(srcMatch[1])}</div>`;
    }
    if (line.trim() === '') return '<div class="analysis-spacer"></div>';
    return `<div class="analysis-line">${processInline(line)}</div>`;
  }).join('');

  return bodyHtml + chakraHtml;
}

// ── Local analysis ──
function analyzeLocal(dreamText, methods) {
  const results = {};

  if (methods.includes('iching')) {
    const matched = matchHexagrams(dreamText);
    if (matched.length === 0) {
      results.iching = '夢境意象較為抽象，難以對應具體卦象。\n\n建議靜心回想夢中最鮮明的一個畫面，重新描述。';
    } else {
      results.iching = matched.map(hex => `
# ☯ ${hex.name}卦（第${hex.num}卦）

**卦辭：**${hex.guaci}

**象傳：**${hex.xiang}

**義理：**${hex.meaning}

**天地告訴你：**${hex.tianDi}
      `.trim()).join('\n\n---\n\n');
    }
  }

  if (methods.includes('jung')) {
    const matched = matchArchetypes(dreamText);
    if (matched.length === 0) {
      results.jung = '夢境中未偵測到明顯的原型意象。\n\n試著描述夢中人物的特徵、你的情緒感受，或場景的氛圍。';
    } else {
      results.jung = matched.map(arch => `
# ${arch.name}（${arch.originalName}）
> ${arch.source || ''}

**${arch.coreDescription}**

## 個體化訊息
${arch.individuationMessage}

## 化象為行
${arch.ritual}
      `.trim()).join('\n\n---\n\n');

      const matchedIds = matched.filter(Boolean).map(a => a.id);
      const chakraResults = getChakraResonance(matchedIds);
      if (chakraResults && chakraResults.length > 0) {
        results.jung += '___CHAKRA___' + JSON.stringify(chakraResults);
      }
    }
  }

  return results;
}

// ── Main analysis flow ──
async function startAnalysis() {
  const dreamText = document.getElementById('dreamInput').value.trim();
  if (!dreamText) { showToast('請先描述你的夢境'); return; }

  const methods = [];
  if (document.getElementById('method-iching').checked) methods.push('iching');
  if (document.getElementById('method-jung').checked)   methods.push('jung');
  if (methods.length === 0) { showToast('請至少選擇一種解夢方式'); return; }

  // UI: loading state
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '解讀中…';
  document.getElementById('loadingArea').classList.add('visible');
  document.getElementById('resultArea').classList.remove('visible');

  try {
    const results = analyzeLocal(dreamText, methods);

    // Render result cards
    const grid = document.getElementById('resultGrid');
    grid.className = 'result-grid' + (methods.length === 2 ? ' dual' : '');
    grid.innerHTML = '';

    const CARD_META = {
      iching: { label: '☯ 易經解析', delay: '0s' },
      jung:   { label: '🧠 榮格分析', delay: methods.length === 2 ? '.12s' : '0s' },
    };

    methods.forEach(m => {
      const { label, delay } = CARD_META[m];
      const card = document.createElement('div');
      card.className = 'result-card';
      card.style.animationDelay = delay;
      card.innerHTML = `
        <div class="result-card-title">${label}</div>
        <div class="analysis-body">${renderAnalysis(results[m])}</div>
      `;
      grid.appendChild(card);
    });

    document.getElementById('resultArea').classList.add('visible');
    document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });

    // Save to Firestore (logged-in users only)
    if (currentUser) {
      await saveDream(dreamText, methods, results);
      await loadHistory();
    }

  } catch (err) {
    console.error('dreamAnalysis error:', err);
    showToast('解夢失敗：' + (err.message || '請稍後再試'));
  } finally {
    btn.disabled = false; btn.textContent = '✨ 開始解夢';
    document.getElementById('loadingArea').classList.remove('visible');
  }
}

// ── Firestore: save dream ──
async function saveDream(dreamText, methods, results) {
  try {
    await db.collection('dreams').add({
      uid: currentUser.uid,
      dreamText,
      methods,
      results,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
  } catch (e) {
    console.warn('Failed to save dream:', e);
  }
}

// ── Firestore: load history ──
async function loadHistory() {
  if (!currentUser) return;
  const listEl = document.getElementById('historyList');
  try {
    const snap = await db.collection('dreams')
      .where('uid', '==', currentUser.uid)
      .orderBy('createdAt', 'desc')
      .limit(10)
      .get();

    if (snap.empty) {
      listEl.innerHTML = '<div class="history-empty">尚無記錄，完成第一次解夢後將自動儲存</div>';
      return;
    }

    const dreams = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    listEl.innerHTML = dreams.map((d, i) => renderHistoryItem(d, i)).join('');
  } catch (e) {
    listEl.innerHTML = '<div class="history-empty">無法載入記錄</div>';
    console.warn('History load error:', e);
  }
}

// ── Render history item ──
const METHOD_LABEL = { iching: '☯ 易經', jung: '🧠 榮格' };

function renderHistoryItem(d, idx) {
  const date = d.createdAt?.toDate?.()
    ? d.createdAt.toDate().toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' })
    : '—';
  const preview  = (d.dreamText || '').slice(0, 50) + ((d.dreamText || '').length > 50 ? '…' : '');
  const tags     = (d.methods || []).map(m => `<span class="history-tag">${METHOD_LABEL[m] || m}</span>`).join('');
  const methods  = d.methods || [];

  // Build result tab panels for each available method
  const hasBoth  = methods.includes('iching') && methods.includes('jung');
  const tabsHTML = hasBoth ? `
    <div class="history-result-tabs">
      <button class="history-tab-btn active" onclick="switchHistoryTab(this,'${d.id}','iching')">☯ 易經</button>
      <button class="history-tab-btn" onclick="switchHistoryTab(this,'${d.id}','jung')">🧠 榮格</button>
    </div>` : '';

  const panelsHTML = methods.map((m, i) => `
    <div class="history-result-panel ${hasBoth && i === 0 ? 'active' : (!hasBoth ? 'active' : '')}"
      id="hrp-${d.id}-${m}">
      ${renderAnalysis(d.results?.[m])}
    </div>`).join('');

  return `
  <div class="history-item" id="hi-${d.id}">
    <div class="history-summary" onclick="toggleHistoryItem('${d.id}')">
      <div class="history-meta">
        <div class="history-date">${date}</div>
        <div class="history-preview">${escHtml(preview)}</div>
        <div class="history-tags">${tags}</div>
      </div>
      <span class="history-toggle">▾</span>
    </div>
    <div class="history-detail">
      <div class="history-detail-inner">
        <div class="history-full-dream">${escHtml(d.dreamText || '')}</div>
        ${tabsHTML}
        ${panelsHTML}
      </div>
    </div>
  </div>`;
}

function toggleHistoryItem(id) {
  document.getElementById(`hi-${id}`)?.classList.toggle('open');
}

function switchHistoryTab(btn, dreamId, method) {
  const item = document.getElementById(`hi-${dreamId}`);
  if (!item) return;
  item.querySelectorAll('.history-tab-btn').forEach(b => b.classList.remove('active'));
  item.querySelectorAll('.history-result-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`hrp-${dreamId}-${method}`)?.classList.add('active');
}

// ── Helpers ──
function escHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
