<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章收藏</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08091a;
      --bg2: #0d0f26;
      --surface: #111328;
      --border: #2a2d4a;
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-dim: #7a6030;
      --silver: #a8b4cc;
      --text: #dde2f0;
      --text-muted: #7080a0;
      --accent: #c9a84c;
      --danger: #e06060;
      --tag-bg: rgba(201,168,76,.12);
      --tag-text: #a08040;
      --glow: rgba(201,168,76,.35);
      --glow-strong: rgba(201,168,76,.7);
    }

    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes star-twinkle {
      0%,100% { opacity: .2; }
      50%      { opacity: 1; }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Starfield ── */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; width: 2px; height: 2px;
      background: #fff; border-radius: 50%;
      animation: star-twinkle var(--dur,3s) ease-in-out infinite;
      animation-delay: var(--delay,0s);
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(180deg, rgba(8,9,26,.98), rgba(8,9,26,.9));
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex; align-items: center; gap: 12px;
      backdrop-filter: blur(12px);
    }
    header h1 {
      font-size: 1.2rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dim));
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
      letter-spacing: .08em; white-space: nowrap;
    }
    header .count { font-size: .82rem; color: var(--text-muted); white-space: nowrap; }

    .header-user { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-shrink: 0; flex-wrap: wrap; }
    .header-user .user-name { font-size: .82rem; color: var(--text-muted); white-space: nowrap; }
    .nav-link {
      text-decoration: none; font-size: .8rem; font-weight: 600;
      color: var(--text-muted); padding: 4px 10px;
      border-radius: 999px; border: 1px solid var(--border);
      transition: color .2s, border-color .2s; white-space: nowrap;
    }
    .nav-link:hover { color: var(--silver); border-color: #4a5070; }
    .btn-sm {
      padding: 4px 11px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; cursor: pointer; font-size: .8rem;
      font-family: inherit; font-weight: 600; color: var(--text-muted);
      transition: border-color .2s, color .2s; white-space: nowrap;
    }
    .btn-sm:hover { border-color: #4a5070; color: var(--silver); }

    /* ── Main ── */
    .main { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 28px 16px 60px; }

    /* ── Cards ── */
    .add-card {
      background: linear-gradient(160deg, #151830, #0d0f26);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 22px;
      margin-bottom: 20px;
      animation: fade-up .5s ease both;
    }
    .add-card h2 {
      font-size: .72rem; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; color: var(--gold-dim); margin-bottom: 14px;
    }

    .url-row { display: flex; gap: 8px; margin-bottom: 12px; }

    input[type=text], input[type=url], textarea, select {
      border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 12px;
      font-size: .9rem; font-family: inherit;
      color: var(--text); background: rgba(255,255,255,.03);
      width: 100%; transition: border-color .15s; outline: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px rgba(201,168,76,.1);
    }
    input::placeholder, textarea::placeholder { color: var(--text-muted); }
    select option { background: var(--surface); color: var(--text); }

    .btn {
      padding: 9px 18px; border-radius: 8px; border: 1px solid transparent;
      cursor: pointer; font-size: .9rem; font-weight: 600;
      font-family: inherit; transition: background .15s, border-color .15s, opacity .15s;
    }
    .btn-primary {
      background: rgba(201,168,76,.15); color: var(--gold-light);
      border-color: var(--gold-dim); white-space: nowrap;
    }
    .btn-primary:hover { background: rgba(201,168,76,.28); border-color: var(--gold); }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; }
    .btn-outline {
      background: transparent; border-color: var(--border); color: var(--text-muted);
    }
    .btn-outline:hover { border-color: #4a5070; color: var(--silver); }
    .btn-danger {
      background: rgba(220,80,80,.1); color: #d07070;
      border-color: rgba(220,80,80,.3); padding: 6px 12px; font-size: .8rem;
    }
    .btn-danger:hover { background: rgba(220,80,80,.22); border-color: rgba(220,80,80,.5); }

    .form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .form-group { flex: 1; min-width: 160px; }
    .form-group label {
      display: block; font-size: .72rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      margin-bottom: 6px; color: var(--gold-dim);
    }

    .stars-input { display: flex; gap: 4px; padding: 6px 0; }
    .star-btn { background: none; border: none; cursor: pointer; font-size: 1.4rem; line-height: 1; padding: 0 2px; transition: transform .1s; }
    .star-btn:hover { transform: scale(1.2); }

    textarea { resize: vertical; min-height: 60px; }

    /* ── Label Picker ── */
    .label-picker { position: relative; }
    .label-trigger {
      border: 1px solid var(--border); border-radius: 8px;
      padding: 7px 10px; min-height: 40px; cursor: pointer;
      display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
      transition: border-color .15s; user-select: none;
      background: rgba(255,255,255,.03);
    }
    .label-trigger:hover { border-color: #4a5070; }
    .label-trigger.open { border-color: var(--gold-dim); box-shadow: 0 0 0 3px rgba(201,168,76,.1); }
    .label-trigger .placeholder { color: var(--text-muted); font-size: .9rem; }
    .sel-chip {
      background: var(--tag-bg); color: var(--tag-text);
      border-radius: 999px; padding: 2px 8px; font-size: .78rem; font-weight: 600;
    }
    .label-dropdown {
      display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: #151830; border: 1px solid var(--border);
      border-radius: 8px; box-shadow: 0 6px 24px rgba(0,0,0,.5);
      z-index: 200; max-height: 260px; overflow-y: auto;
    }
    .label-dropdown.open { display: block; }
    .label-option { display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer; }
    .label-option:hover { background: rgba(255,255,255,.04); }
    .label-option input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; flex-shrink: 0; accent-color: var(--gold); }
    .label-option .opt-name { flex: 1; font-size: .9rem; cursor: pointer; }
    .del-label-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: .85rem; font-weight: 700;
      padding: 2px 6px; border-radius: 4px; line-height: 1; flex-shrink: 0;
    }
    .del-label-btn:hover { background: rgba(220,80,80,.2); color: #d07070; }
    .label-empty { padding: 10px 12px; color: var(--text-muted); font-size: .85rem; }
    .label-add-row {
      display: flex; gap: 6px; padding: 8px;
      border-top: 1px solid var(--border); position: sticky; bottom: 0;
      background: #151830;
    }
    .label-add-row input { flex: 1; font-size: .85rem; }

    /* ── Filters ── */
    .filters {
      background: linear-gradient(160deg, #151830, #0d0f26);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 16px; margin-bottom: 20px;
      display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end;
      animation: fade-up .5s .06s ease both;
    }
    .filters .form-group { min-width: 130px; }
    .filters input[type=text] { min-width: 200px; }

    /* ── Tag chips ── */
    .tag-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .tag-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 999px;
      background: var(--tag-bg); color: var(--tag-text);
      font-size: .78rem; font-weight: 600;
      cursor: pointer; border: 1px solid rgba(201,168,76,.2);
      transition: border-color .15s, color .15s;
    }
    .tag-chip.active { border-color: var(--gold); color: var(--gold); }
    .tag-chip:hover { border-color: var(--gold-dim); color: var(--gold-dim); }

    /* ── Articles header ── */
    .articles-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .articles-header h3 {
      font-size: .72rem; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; color: var(--gold-dim);
    }

    /* ── Article cards ── */
    .article-card {
      background: linear-gradient(160deg, #141728, #0d0f26);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 16px; margin-bottom: 10px;
      transition: border-color .2s;
    }
    .article-card:hover { border-color: var(--gold-dim); }
    .article-card.is-read { opacity: .6; }

    .article-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
    .article-title { flex: 1; font-size: .98rem; font-weight: 600; line-height: 1.45; }
    .article-title a { color: var(--text); text-decoration: none; }
    .article-title a:hover { color: var(--gold-light); text-decoration: underline; }
    .article-stars { display: flex; gap: 1px; flex-shrink: 0; }

    .article-meta {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      font-size: .78rem; color: var(--text-muted); margin-bottom: 6px;
    }
    .article-url { max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .article-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .article-tag {
      background: var(--tag-bg); color: var(--tag-text);
      border-radius: 999px; padding: 1px 8px; font-size: .75rem; font-weight: 600;
      cursor: pointer; border: 1px solid rgba(201,168,76,.15);
      transition: border-color .15s;
    }
    .article-tag:hover { border-color: var(--gold-dim); }

    .article-notes { font-size: .84rem; color: var(--text-muted); margin-top: 6px; white-space: pre-wrap; }

    .article-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
    .btn-read {
      padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; cursor: pointer; font-size: .78rem;
      font-family: inherit; color: var(--text-muted);
      transition: border-color .15s, color .15s;
    }
    .btn-read:hover { border-color: #4a5070; color: var(--silver); }
    .btn-read.marked {
      background: rgba(80,180,100,.12); border-color: rgba(80,180,100,.35); color: #70c080;
    }
    .btn-edit {
      padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; cursor: pointer; font-size: .78rem;
      font-family: inherit; color: var(--text-muted);
      transition: border-color .15s, color .15s;
    }
    .btn-edit:hover { border-color: #4a5070; color: var(--silver); }

    /* ── Inline edit panel ── */
    .edit-panel {
      display: none; margin-top: 12px; padding-top: 12px;
      border-top: 1px solid var(--border); overflow: visible;
    }
    .edit-panel.open { display: block; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1a1d3a; color: var(--silver);
      border: 1px solid var(--border);
      padding: 10px 18px; border-radius: 10px;
      font-size: .88rem; opacity: 0;
      transition: opacity .3s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 600px) {
      .url-row { flex-direction: column; }
      .url-row input, .url-row button { width: 100%; box-sizing: border-box; }
      .form-row { flex-direction: column; }
      .form-row .form-group { width: 100%; min-width: unset; max-width: unset !important; box-sizing: border-box; }
      .filters { flex-direction: column; align-items: stretch; }
      .filters .form-group { width: 100%; min-width: unset; box-sizing: border-box; }
      .filters input[type=text] { width: 100%; min-width: unset; box-sizing: border-box; }
      .filters select { width: 100%; box-sizing: border-box; }
      .header-user { gap: 6px; }
    }
  </style>
</head>
<body>

<!-- Starfield -->
<div class="stars" id="stars"></div>

<header>
  <h1>📚 文章收藏</h1>
  <span class="count" id="articleCount"></span>
  <div class="header-user">
    <span class="user-name" id="headerUserName"></span>
    <a class="nav-link" href="/index.html">📰 文章收藏</a>
    <a class="nav-link" href="/bulletin.html">📢 公告欄</a>
    <a class="nav-link" href="/runes.html">🔮 神諭</a>
    <a class="nav-link" href="/dream.html">🌙 解夢</a>
    <a class="nav-link" href="/rainbow.html">🌈 彩虹卡</a>
    <a class="nav-link" href="/morning.html">🌅 晨間儀式</a>
    <a class="nav-link" href="/iching.html">☯ 易經占卜</a>
    <a class="nav-link" href="/pomodoro.html">🍅 番茄鐘</a>
    <button class="btn-sm" onclick="location.href='/settings.html'">設定</button>
    <button class="btn-sm" onclick="logout()">登出</button>
  </div>
</header>

<div class="main">

  <!-- Add Form -->
  <div class="add-card">
    <h2>新增文章</h2>
    <div class="url-row">
      <input type="url" id="urlInput" placeholder="貼上文章網址，自動抓取標題…" autocomplete="off">
      <button class="btn btn-primary" id="fetchBtn" onclick="fetchTitle()">取得標題</button>
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label>標題</label>
        <input type="text" id="titleInput" placeholder="文章標題">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>標籤</label>
        <div class="label-picker">
          <div class="label-trigger" id="labelTrigger-add" onclick="togglePicker('add')">
            <span class="placeholder">選擇標籤…</span>
          </div>
          <div class="label-dropdown" id="labelDd-add">
            <div id="labelOpts-add"></div>
            <div class="label-add-row">
              <input type="text" id="newLabel-add" placeholder="新增標籤名稱…"
                onkeydown="if(event.key==='Enter'){event.preventDefault();createLabel('add')}"
                onclick="event.stopPropagation()">
              <button class="btn btn-outline" style="padding:6px 10px;white-space:nowrap"
                onclick="createLabel('add');event.stopPropagation()">+ 新增</button>
            </div>
          </div>
        </div>
      </div>
      <div class="form-group" style="max-width:160px">
        <label>重要程度</label>
        <div class="stars-input" id="addStars">
          <button class="star-btn" onclick="setAddStar(1)">⭐</button>
          <button class="star-btn" onclick="setAddStar(2)">⭐</button>
          <button class="star-btn" onclick="setAddStar(3)">⭐</button>
        </div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>備註</label>
        <textarea id="notesInput" placeholder="可選填…"></textarea>
      </div>
    </div>
    <div style="display:flex; gap:8px; justify-content:flex-end">
      <button class="btn btn-outline" onclick="clearForm()">清除</button>
      <button class="btn btn-primary" onclick="addArticle()">儲存文章</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <div class="form-group">
      <label>搜尋</label>
      <input type="text" id="searchInput" placeholder="搜尋標題、網址、備註…" oninput="debounceLoad()">
    </div>
    <div class="form-group">
      <label>重要程度</label>
      <select id="filterImportance" onchange="renderArticles()">
        <option value="">全部</option>
        <option value="3">⭐⭐⭐ 三星</option>
        <option value="2">⭐⭐ 二星</option>
        <option value="1">⭐ 一星</option>
      </select>
    </div>
    <div class="form-group">
      <label>排序</label>
      <select id="filterSort" onchange="renderArticles()">
        <option value="newest">最新加入</option>
        <option value="oldest">最早加入</option>
        <option value="importance">重要程度</option>
      </select>
    </div>
    <button class="btn btn-outline" onclick="clearFilters()">清除篩選</button>
  </div>

  <!-- Label filter chips -->
  <div class="tag-chips" id="tagChips"></div>

  <!-- Articles -->
  <div class="articles-header">
    <h3 id="listLabel">所有文章</h3>
  </div>
  <div id="articleList"></div>

</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script>
// ── Starfield ──
(function generateStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 100; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() < .2 ? 3 : 2;
    s.style.cssText =
      `left:${Math.random()*100}%;top:${Math.random()*100}%;`
      + `width:${sz}px;height:${sz}px;`
      + `--dur:${2+Math.random()*4}s;--delay:${Math.random()*5}s;`
      + `opacity:${.1+Math.random()*.3};`;
    c.appendChild(s);
  }
})();

// ── Firebase init ──
const firebaseConfig = {
  apiKey: "AIzaSyDEWMEv-0vMixLtjPx2ZPiUzHgtW7cg1ug",
  authDomain: "oz-workspace.firebaseapp.com",
  projectId: "oz-workspace",
  storageBucket: "oz-workspace.firebasestorage.app",
  messagingSenderId: "128483648899",
  appId: "1:128483648899:web:56b21e29cd2c677f7002b6"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

// ── State ──
let currentUser = null;
let _labels     = [];
let _allArticles = [];   // full list fetched from Firestore
let _pickerState = { add: new Set() };
let addStarValue = 1;
let activeTag    = '';
let debounceTimer;
const editStarValues = {};

// ── Helpers ──
function articlesRef() {
  return db.collection(`users/${currentUser.uid}/articles`);
}
function labelsRef() {
  return db.collection(`users/${currentUser.uid}/labels`);
}
function toDate(val) {
  if (!val) return null;
  if (val.toDate) return val.toDate();
  return new Date(val);
}

// ── Stars ──
function setAddStar(v) {
  addStarValue = v;
  document.querySelectorAll('#addStars .star-btn').forEach((btn, i) => {
    btn.style.filter = i < v ? '' : 'grayscale(1) opacity(.3)';
  });
}
setAddStar(1);

function setEditStar(id, v) {
  editStarValues[id] = v;
  const container = document.getElementById(`estars-${id}`);
  if (!container) return;
  container.querySelectorAll('.star-btn').forEach((btn, i) => {
    btn.style.filter = i < v ? '' : 'grayscale(1) opacity(.3)';
  });
}

// ── Label Picker ──
function getSelected(ctx) {
  if (!_pickerState[ctx]) _pickerState[ctx] = new Set();
  return _pickerState[ctx];
}

function togglePicker(ctx) {
  const dd = document.getElementById(`labelDd-${ctx}`);
  if (!dd) return;
  const opening = !dd.classList.contains('open');
  document.querySelectorAll('.label-dropdown.open').forEach(d => {
    d.classList.remove('open');
    const t = document.getElementById('labelTrigger-' + d.id.replace('labelDd-', ''));
    if (t) t.classList.remove('open');
  });
  if (opening) {
    dd.classList.add('open');
    document.getElementById(`labelTrigger-${ctx}`).classList.add('open');
    renderLabelOptions(ctx);
  }
}

function renderLabelOptions(ctx) {
  const container = document.getElementById(`labelOpts-${ctx}`);
  if (!container) return;
  const selected = getSelected(ctx);
  if (_labels.length === 0) {
    container.innerHTML = '<div class="label-empty">尚無標籤，請新增</div>';
    return;
  }
  container.innerHTML = _labels.map(l => `
    <div class="label-option" onclick="toggleLabelCheck('${ctx}','${l.id}','${escJs(l.name)}');event.stopPropagation()">
      <input type="checkbox" id="lchk-${ctx}-${l.id}"
        ${selected.has(l.name) ? 'checked' : ''}
        onclick="event.stopPropagation()"
        onchange="toggleLabelCheck('${ctx}','${l.id}','${escJs(l.name)}')">
      <span class="opt-name">${escHtml(l.name)}</span>
      <button class="del-label-btn" onclick="deleteLabel('${l.id}',event)" title="刪除標籤">×</button>
    </div>
  `).join('');
}

function renderPickerTrigger(ctx) {
  const trigger = document.getElementById(`labelTrigger-${ctx}`);
  if (!trigger) return;
  const selected = getSelected(ctx);
  if (selected.size === 0) {
    trigger.innerHTML = '<span class="placeholder">選擇標籤…</span>';
  } else {
    trigger.innerHTML = [...selected].map(t => `<span class="sel-chip">${escHtml(t)}</span>`).join('');
  }
}

function toggleLabelCheck(ctx, labelId, labelName) {
  const selected = getSelected(ctx);
  if (selected.has(labelName)) selected.delete(labelName);
  else selected.add(labelName);
  const cb = document.getElementById(`lchk-${ctx}-${labelId}`);
  if (cb) cb.checked = selected.has(labelName);
  renderPickerTrigger(ctx);
}

async function createLabel(ctx) {
  const input = document.getElementById(`newLabel-${ctx}`);
  const name  = input.value.trim();
  if (!name) return;
  if (_labels.find(l => l.name === name)) { showToast('標籤名稱已存在'); return; }

  try {
    const docRef = await labelsRef().add({ name });
    input.value = '';
    await loadLabels();
    getSelected(ctx).add(name);
    renderPickerTrigger(ctx);
    renderLabelOptions(ctx);
    showToast(`已新增標籤「${name}」`);
  } catch {
    showToast('新增失敗');
  }
}

async function deleteLabel(id, e) {
  e.stopPropagation();
  const label = _labels.find(l => l.id === id);
  if (!label) return;
  if (!confirm(`確定刪除標籤「${label.name}」？\n（不影響已儲存的文章記錄）`)) return;

  try {
    await labelsRef().doc(id).delete();
    Object.values(_pickerState).forEach(set => set.delete(label.name));
    await loadLabels();
    document.querySelectorAll('.label-dropdown.open').forEach(dd => {
      const ctx = dd.id.replace('labelDd-', '');
      renderLabelOptions(ctx);
      renderPickerTrigger(ctx);
    });
    showToast(`已刪除標籤「${label.name}」`);
  } catch {
    showToast('刪除失敗');
  }
}

// close dropdown when clicking outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('.label-picker')) {
    document.querySelectorAll('.label-dropdown.open').forEach(d => d.classList.remove('open'));
    document.querySelectorAll('.label-trigger.open').forEach(t => t.classList.remove('open'));
  }
});

// ── URL / Title ──
document.addEventListener('DOMContentLoaded', () => {
  const urlInput = document.getElementById('urlInput');
  urlInput.addEventListener('paste', (e) => {
    const pasted = (e.clipboardData || window.clipboardData).getData('text').trim();
    if (pasted.startsWith('http')) {
      setTimeout(() => autoFetch(pasted), 50);
    }
  });
  urlInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addArticle();
  });
  document.getElementById('titleInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addArticle();
  });
});

async function autoFetch(url) {
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.textContent = '抓取中…';
  try {
    const res  = await fetch('/api/fetch-title?url=' + encodeURIComponent(url));
    const data = await res.json();
    if (data.title) {
      document.getElementById('titleInput').value = data.title;
      document.getElementById('titleInput').focus();
    } else {
      showToast('無法自動取得標題，請手動輸入');
      document.getElementById('titleInput').focus();
    }
  } catch {
    showToast('網路錯誤，請手動輸入標題');
  } finally {
    btn.disabled = false;
    btn.textContent = '取得標題';
  }
}

async function fetchTitle() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return showToast('請先輸入網址');
  await autoFetch(url);
}

// ── Add Article ──
async function addArticle() {
  const url   = document.getElementById('urlInput').value.trim();
  const title = document.getElementById('titleInput').value.trim();
  if (!url)   return showToast('請輸入網址');
  if (!title) return showToast('請輸入標題');

  const tags = [...getSelected('add')].join(',');
  try {
    await articlesRef().add({
      url, title, tags,
      importance: addStarValue,
      notes: document.getElementById('notesInput').value.trim(),
      created_at: firebase.firestore.FieldValue.serverTimestamp(),
      read_at: null,
    });
    showToast('文章已儲存');
    clearForm();
    await loadArticles();
  } catch {
    showToast('儲存失敗');
  }
}

function clearForm() {
  document.getElementById('urlInput').value   = '';
  document.getElementById('titleInput').value = '';
  document.getElementById('notesInput').value = '';
  _pickerState.add = new Set();
  renderPickerTrigger('add');
  renderLabelOptions('add');
  setAddStar(1);
}

// ── Filters ──
function debounceLoad() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(renderArticles, 300);
}

function clearFilters() {
  document.getElementById('searchInput').value     = '';
  document.getElementById('filterImportance').value = '';
  document.getElementById('filterSort').value       = 'newest';
  activeTag = '';
  renderTagChips();
  renderArticles();
}

// ── Load Articles from Firestore ──
async function loadArticles() {
  const snap = await articlesRef().get();
  _allArticles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderArticles();
}

// ── Render Articles (filter + sort in memory) ──
function renderArticles() {
  const q          = document.getElementById('searchInput').value.trim().toLowerCase();
  const importance = document.getElementById('filterImportance').value;
  const sort       = document.getElementById('filterSort').value;

  let articles = [..._allArticles];

  if (q) {
    articles = articles.filter(a =>
      (a.title  || '').toLowerCase().includes(q) ||
      (a.url    || '').toLowerCase().includes(q) ||
      (a.notes  || '').toLowerCase().includes(q) ||
      (a.tags   || '').toLowerCase().includes(q)
    );
  }
  if (importance) {
    articles = articles.filter(a => a.importance === Number(importance));
  }
  if (activeTag) {
    articles = articles.filter(a =>
      (a.tags || '').split(',').map(t => t.trim()).includes(activeTag)
    );
  }

  // Sort
  const getTime = a => a.created_at?.seconds ?? (toDate(a.created_at)?.getTime() / 1000 ?? 0);
  if (sort === 'oldest') {
    articles.sort((a, b) => getTime(a) - getTime(b));
  } else if (sort === 'importance') {
    articles.sort((a, b) => b.importance - a.importance || getTime(b) - getTime(a));
  } else {
    articles.sort((a, b) => getTime(b) - getTime(a));
  }

  const filtered = articles;
  document.getElementById('articleCount').textContent = `共 ${_allArticles.length} 篇`;
  document.getElementById('listLabel').textContent =
    (q || importance || activeTag) ? `篩選結果（${filtered.length} 篇）` : `所有文章（${filtered.length} 篇）`;

  const list = document.getElementById('articleList');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><div>沒有符合的文章</div></div>`;
    return;
  }
  list.innerHTML = filtered.map(a => renderCard(a)).join('');
}

// ── Render Card ──
function renderCard(a) {
  const stars  = '⭐'.repeat(a.importance) + '<span style="opacity:.2">⭐</span>'.repeat(3 - a.importance);
  const tags   = a.tags ? a.tags.split(',').map(t => t.trim()).filter(Boolean)
    .map(t => `<span class="article-tag" onclick="filterByTag('${escJs(t)}')">${escHtml(t)}</span>`).join('') : '';
  const createdAt = toDate(a.created_at);
  const date   = createdAt
    ? createdAt.toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit' })
    : '—';
  const isRead     = !!a.read_at;
  const readClass  = isRead ? 'btn-read marked' : 'btn-read';
  const readLabel  = isRead ? '✅ 已閱讀' : '標記已讀';
  const notes      = a.notes ? `<div class="article-notes">${escHtml(a.notes)}</div>` : '';

  return `
  <div class="article-card ${isRead ? 'is-read' : ''}" id="card-${a.id}">
    <div class="article-top">
      <div class="article-title"><a href="${escHtml(a.url)}" target="_blank" rel="noopener">${escHtml(a.title)}</a></div>
      <div class="article-stars">${stars}</div>
    </div>
    <div class="article-meta">
      <span class="article-url">${escHtml(hostname(a.url))}</span>
      <span>·</span>
      <span>${date}</span>
    </div>
    ${tags ? `<div class="article-tags">${tags}</div>` : ''}
    ${notes}
    <div class="article-actions">
      <button class="${readClass}" onclick="toggleRead('${a.id}',${isRead})">${readLabel}</button>
      <button class="btn-edit" onclick="toggleEdit('${a.id}')">✏️ 編輯</button>
      <button class="btn btn-danger" onclick="deleteArticle('${a.id}')">刪除</button>
    </div>
    <div class="edit-panel" id="edit-${a.id}"></div>
  </div>`;
}

// ── Edit Panel ──
function toggleEdit(id) {
  const panel  = document.getElementById(`edit-${id}`);
  const isOpen = panel.classList.contains('open');

  if (!isOpen) {
    const article = _allArticles.find(a => a.id === id);
    const ctx     = `e${id}`;
    panel.innerHTML = renderEditPanel(id, article);
    _pickerState[ctx] = new Set(
      (article?.tags || '').split(',').map(t => t.trim()).filter(Boolean)
    );
    renderLabelOptions(ctx);
    renderPickerTrigger(ctx);
    setEditStar(id, article?.importance || 1);
    panel.classList.add('open');
  } else {
    panel.classList.remove('open');
  }
}

function renderEditPanel(id, a) {
  const ctx      = `e${id}`;
  const noteVal  = escHtml(a?.notes  || '');
  const titleVal = escHtml(a?.title  || '');
  return `
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label>標題</label>
        <input type="text" id="etitle-${id}" value="${titleVal}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>標籤</label>
        <div class="label-picker">
          <div class="label-trigger" id="labelTrigger-${ctx}" onclick="togglePicker('${ctx}')">
            <span class="placeholder">選擇標籤…</span>
          </div>
          <div class="label-dropdown" id="labelDd-${ctx}">
            <div id="labelOpts-${ctx}"></div>
            <div class="label-add-row">
              <input type="text" id="newLabel-${ctx}" placeholder="新增標籤名稱…"
                onkeydown="if(event.key==='Enter'){event.preventDefault();createLabel('${ctx}')}"
                onclick="event.stopPropagation()">
              <button class="btn btn-outline" style="padding:6px 10px;white-space:nowrap"
                onclick="createLabel('${ctx}');event.stopPropagation()">+ 新增</button>
            </div>
          </div>
        </div>
      </div>
      <div class="form-group" style="max-width:160px">
        <label>重要程度</label>
        <div class="stars-input" id="estars-${id}">
          <button class="star-btn" onclick="setEditStar('${id}',1)">⭐</button>
          <button class="star-btn" onclick="setEditStar('${id}',2)">⭐</button>
          <button class="star-btn" onclick="setEditStar('${id}',3)">⭐</button>
        </div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>備註</label>
        <textarea id="enotes-${id}">${noteVal}</textarea>
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="toggleEdit('${id}')">取消</button>
      <button class="btn btn-primary" onclick="saveEdit('${id}')">儲存</button>
    </div>`;
}

async function saveEdit(id) {
  const title      = document.getElementById(`etitle-${id}`).value.trim();
  const notes      = document.getElementById(`enotes-${id}`).value.trim();
  const ctx        = `e${id}`;
  const tags       = [...getSelected(ctx)].join(',');
  const importance = editStarValues[id] || 1;

  if (!title) return showToast('標題不能為空');

  try {
    await articlesRef().doc(id).update({ title, tags, notes, importance });
    showToast('已更新');
    await loadArticles();
  } catch {
    showToast('更新失敗');
  }
}

async function toggleRead(id, isRead) {
  try {
    await articlesRef().doc(id).update({
      read_at: isRead ? null : firebase.firestore.FieldValue.serverTimestamp(),
    });
    await loadArticles();
  } catch {
    showToast('操作失敗');
  }
}

async function deleteArticle(id) {
  if (!confirm('確定要刪除這篇文章嗎？')) return;
  try {
    await articlesRef().doc(id).delete();
    showToast('文章已刪除');
    await loadArticles();
  } catch {
    showToast('刪除失敗');
  }
}

// ── Labels & Filter Chips ──
async function loadLabels() {
  const snap = await labelsRef().orderBy('name').get();
  _labels = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderTagChips();
  renderLabelOptions('add');
}

function renderTagChips() {
  const container = document.getElementById('tagChips');
  if (_labels.length === 0) { container.innerHTML = ''; return; }
  container.innerHTML = _labels.map(l =>
    `<span class="tag-chip ${activeTag === l.name ? 'active' : ''}" onclick="filterByTag('${escJs(l.name)}')">${escHtml(l.name)}</span>`
  ).join('');
}

function filterByTag(tag) {
  activeTag = activeTag === tag ? '' : tag;
  renderTagChips();
  renderArticles();
}

// ── Helpers ──
function hostname(url) {
  try { return new URL(url).hostname.replace('www.', ''); } catch { return url; }
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function escJs(s) {
  if (!s) return '';
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Auth & Init ──
async function logout() {
  await auth.signOut();
  window.location.replace('/login.html');
}

auth.onAuthStateChanged(user => {
  if (!user) { window.location.replace('/login.html'); return; }
  currentUser = user;
  document.getElementById('headerUserName').textContent = user.displayName || user.email;
  loadLabels();
  loadArticles();
});
</script>
