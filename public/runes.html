<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>盧恩符文神諭</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08091a;
      --bg2: #0d0f26;
      --surface: #111328;
      --border: #2a2d4a;
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-dim: #7a6030;
      --silver: #a8b4cc;
      --text: #dde2f0;
      --text-muted: #7080a0;
      --glow: rgba(201,168,76,.35);
      --glow-strong: rgba(201,168,76,.7);
    }

    @keyframes pulse-glow {
      0%,100% { box-shadow: 0 0 20px var(--glow), 0 0 60px var(--glow); }
      50%      { box-shadow: 0 0 40px var(--glow-strong), 0 0 100px var(--glow); }
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes flip-in {
      0%   { transform: rotateY(90deg) scale(.8); opacity: 0; }
      60%  { transform: rotateY(-8deg) scale(1.03); opacity: 1; }
      100% { transform: rotateY(0deg) scale(1); }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes star-twinkle {
      0%,100% { opacity: .2; }
      50%      { opacity: 1; }
    }
    @keyframes rune-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Starfield ── */
    .stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: star-twinkle var(--dur, 3s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(180deg, rgba(8,9,26,.98) 0%, rgba(8,9,26,.9) 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      backdrop-filter: blur(12px);
    }
    .back-link {
      color: var(--gold-dim);
      text-decoration: none;
      font-size: .85rem;
      letter-spacing: .05em;
      transition: color .2s;
    }
    .back-link:hover { color: var(--gold); }
    .header-right {
      margin-left: auto; display: flex; align-items: center;
      gap: 8px; flex-wrap: wrap;
    }
    .nav-link {
      text-decoration: none; font-size: .8rem; font-weight: 600;
      color: var(--text-muted); padding: 4px 10px;
      border-radius: 999px; border: 1px solid var(--border);
      transition: color .2s, border-color .2s; white-space: nowrap;
    }
    .nav-link:hover { color: var(--silver); border-color: #4a5070; }
    header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dim));
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
      letter-spacing: .12em;
    }

    /* ── Main ── */
    .main {
      position: relative; z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* ── Instruction card ── */
    .instruction {
      width: 100%;
      background: linear-gradient(135deg, rgba(20,22,45,.9), rgba(13,15,38,.9));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 28px;
      text-align: center;
    }
    .instruction p {
      font-size: 1rem;
      line-height: 1.8;
      color: var(--silver);
      letter-spacing: .06em;
    }
    .instruction .rune-deco {
      display: block;
      font-size: 1.5rem;
      color: var(--gold-dim);
      margin-bottom: 8px;
      letter-spacing: .3em;
    }

    /* ── Oracle button ── */
    .oracle-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .oracle-btn {
      width: 140px; height: 140px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      background: radial-gradient(circle at 40% 35%, #1c1f40, #08091a);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.8rem;
      color: var(--gold);
      transition: transform .2s, border-color .3s;
      animation: pulse-glow 3s ease-in-out infinite, float 4s ease-in-out infinite;
      position: relative;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .oracle-btn::before {
      content: '';
      position: absolute; inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,.2);
    }
    .oracle-btn::after {
      content: '';
      position: absolute; inset: -16px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,.08);
    }
    .oracle-btn:hover {
      transform: scale(1.07);
      border-color: var(--gold-light);
      box-shadow: 0 0 60px var(--glow-strong), 0 0 120px var(--glow);
    }
    .oracle-btn:active { transform: scale(.97); }
    .oracle-btn.spinning .oracle-rune {
      animation: rune-spin .6s linear;
    }
    .oracle-hint {
      font-size: .82rem;
      color: var(--text-muted);
      letter-spacing: .08em;
    }

    /* ── Card area ── */
    .card-area {
      width: 100%;
      perspective: 1200px;
      min-height: 10px;
    }

    .rune-card {
      width: 100%;
      background: linear-gradient(160deg, #151830 0%, #0d0f26 60%, #0a0c1e 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: flip-in .7s cubic-bezier(.34,1.56,.64,1) forwards;
    }
    .rune-card::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,.08) 0%, transparent 65%);
      pointer-events: none;
    }

    /* corner ornaments */
    .rune-card::after {
      content: '᚛᚜';
      position: absolute;
      bottom: 14px; right: 18px;
      font-size: 1.1rem;
      color: var(--gold-dim);
      opacity: .4;
      letter-spacing: .2em;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 28px;
    }
    .rune-number {
      font-size: .75rem;
      color: var(--text-muted);
      letter-spacing: .1em;
    }
    .orientation-badge {
      font-size: .75rem;
      padding: 3px 10px;
      border-radius: 999px;
      letter-spacing: .06em;
      font-weight: 600;
    }
    .upright   { background: rgba(201,168,76,.15); color: var(--gold); border: 1px solid rgba(201,168,76,.3); }
    .reversed  { background: rgba(120,80,180,.18); color: #c090f0; border: 1px solid rgba(160,100,220,.35); }

    .rune-symbol {
      font-size: 7rem;
      line-height: 1;
      color: var(--gold-light);
      text-shadow: 0 0 30px var(--glow-strong), 0 0 60px var(--glow);
      margin: 0 auto 16px;
      display: block;
      animation: fade-up .5s .2s both;
    }
    .rune-symbol.rev { display: inline-block; transform: rotate(180deg); }

    .rune-name {
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: .15em;
      margin-bottom: 4px;
      animation: fade-up .5s .3s both;
    }
    .rune-name-zh {
      font-size: .95rem;
      color: var(--silver);
      letter-spacing: .2em;
      margin-bottom: 28px;
      animation: fade-up .5s .35s both;
    }

    .divider {
      width: 60%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      margin: 0 auto 28px;
    }

    .reading-section {
      text-align: left;
      animation: fade-up .5s .45s both;
    }
    .reading-block {
      margin-bottom: 20px;
    }
    .reading-block h4 {
      font-size: .78rem;
      font-weight: 700;
      color: var(--gold-dim);
      letter-spacing: .18em;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .reading-block h4::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }
    .reading-block p {
      font-size: .95rem;
      line-height: 1.85;
      color: var(--text);
      letter-spacing: .04em;
    }
    .reading-block.action p {
      color: var(--gold-light);
    }

    /* ── Again button ── */
    .again-btn {
      display: block;
      margin: 4px auto 0;
      padding: 12px 40px;
      border-radius: 999px;
      border: 1px solid var(--gold);
      background: transparent;
      color: var(--gold);
      font-size: .9rem;
      font-weight: 600;
      letter-spacing: .12em;
      cursor: pointer;
      transition: background .2s, color .2s, box-shadow .2s;
      font-family: inherit;
      animation: fade-up .5s .6s both;
    }
    .again-btn:hover {
      background: rgba(201,168,76,.12);
      box-shadow: 0 0 20px var(--glow);
    }
    .again-btn:active { transform: scale(.97); }

    /* ── User controls ── */
    .user-name { font-size: .82rem; color: var(--text-muted); white-space: nowrap; }
    .btn-hdr {
      padding: 4px 11px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; cursor: pointer; font-size: .8rem;
      font-family: inherit; font-weight: 600; color: var(--text-muted);
      transition: border-color .2s, color .2s; white-space: nowrap;
    }
    .btn-hdr:hover { border-color: #4a5070; color: var(--silver); }

    /* ── History section ── */
    .history-area { display: none; width: 100%; animation: fade-up .5s ease both; }
    .history-area.visible { display: block; }
    .history-heading {
      font-size: .73rem; font-weight: 700;
      color: var(--gold-dim); letter-spacing: .2em; text-transform: uppercase;
      display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
    }
    .history-heading::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }
    .history-list { display: flex; flex-direction: column; gap: 10px; }
    .history-item {
      background: linear-gradient(160deg, #141728, #0d0f26);
      border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
      transition: border-color .2s;
    }
    .history-item:hover { border-color: var(--gold-dim); }
    .history-summary {
      padding: 14px 18px; cursor: pointer;
      display: flex; align-items: flex-start; gap: 12px;
    }
    .history-meta { flex: 1; min-width: 0; }
    .history-date { font-size: .72rem; color: var(--text-muted); letter-spacing: .08em; margin-bottom: 5px; }
    .history-preview {
      font-size: .92rem; color: var(--silver);
      display: flex; align-items: center; gap: 8px;
    }
    .history-rune-symbol { font-size: 1.3rem; color: var(--gold); line-height: 1; }
    .history-toggle {
      font-size: .8rem; color: var(--text-muted);
      flex-shrink: 0; margin-top: 2px; transition: transform .2s;
    }
    .history-item.open .history-toggle { transform: rotate(180deg); }
    .history-detail {
      display: none; padding: 0 18px 16px;
      border-top: 1px solid rgba(42,45,74,.7);
    }
    .history-item.open .history-detail { display: block; }
    .history-block { margin-top: 14px; }
    .history-block-title {
      font-size: .72rem; font-weight: 700; color: var(--gold-dim);
      letter-spacing: .14em; text-transform: uppercase; margin-bottom: 6px;
    }
    .history-block-text { font-size: .84rem; color: var(--silver); line-height: 1.75; }
    .history-block-text.action { color: var(--gold-light); }
    .history-empty {
      text-align: center; padding: 32px 20px;
      color: var(--text-muted); font-size: .85rem; letter-spacing: .08em;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; right: 28px;
      background: #1a1d3a; color: var(--silver);
      border: 1px solid var(--border);
      padding: 10px 20px; border-radius: 10px;
      font-size: .85rem; opacity: 0;
      transition: opacity .3s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .rune-symbol { font-size: 5.5rem; }
      .rune-card { padding: 28px 20px 32px; }
    }
  </style>
</head>

<!-- Starfield -->
<div class="stars" id="stars"></div>

<header>
  <h1>ᚱ 盧恩符文神諭</h1>
  <div class="header-right">
    <a class="nav-link" href="/index.html">📰 文章收藏</a>
    <a class="nav-link" href="/bulletin.html">📢 公告欄</a>

<div class="main">

  <!-- Instruction -->
  <div class="instruction">

  </div>

  <!-- Oracle button -->
  <div class="oracle-wrap">
    <button class="oracle-btn" id="oracleBtn" aria-label="召喚符文神諭">
      <span class="oracle-rune" id="oracleRune">ᚷ</span>
    </button>
    <span class="oracle-hint">點擊符文 · 召喚神諭</span>
  </div>

  <!-- Card area -->
  <div class="card-area" id="cardArea"></div>

  <!-- History (auth only) -->
  <div class="history-area" id="historyArea">
    <div class="history-heading">抽卡歷程記錄</div>
    <div class="history-list" id="historyList">
      <div class="history-empty">載入中…</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script>
const RUNES = [
  {
    symbol: 'ᚠ', name: 'Fehu', zh: '費胡・財富',
    num: 1,
    core: '費胡是北歐盧恩字母的第一個符文，象徵流動的財富、牲畜與繁榮。它代表原始的生命力量，以及透過努力所換來的豐盛成果。',
    insight: '你所追求的事物，並非遙不可及。費胡告訴你：豐盛的契機已悄然靠近，關鍵在於你是否準備好敞開雙手去接納。',
    action: '積極管理你的資源——無論是金錢、時間還是精力。分享你所擁有的，流動的能量才能帶來更大的回報。',
    core_rev: '費胡逆位警示你可能面臨資源流失、財務混亂或對物質的過度執著。貪婪與揮霍都將阻礙真正的繁榮。',
    insight_rev: '此刻可能存在財務上的隱憂，或是對某件事的佔有欲正在消耗你的能量。',
    action_rev: '重新審視你的消費與投資模式，停止不必要的損耗，先穩定根基再向外擴展。'
  },
  {
    symbol: 'ᚢ', name: 'Uruz', zh: '烏魯茲・原力',
    num: 2,
    core: '烏魯茲象徵原始的野牛之力，代表蠻荒的力量、健康與生命力。它是一股無拘無束、強悍而充滿活力的能量。',
    insight: '你內在有一股強大的力量尚未完全釋放。此刻宇宙鼓勵你信任自己的直覺與體能，勇敢面對挑戰。',
    action: '鍛鍊身體，照顧健康，讓自己保持在最佳狀態。勇氣與耐力是現在最需要的資糧。',
    core_rev: '逆位的烏魯茲暗示力量的誤用、魯莽或優柔寡斷。你可能正在浪費寶貴的生命力量。',
    insight_rev: '你的某些衝動或行動可能過於強硬，或反之過於被動，缺乏決心去面對眼前的局面。',
    action_rev: '找回平衡——既不要莽撞行事，也不要退縮逃避。適當休息，讓力量重新積聚。'
  },
  {
    symbol: 'ᚦ', name: 'Thurisaz', zh: '瑟里薩茲・荊棘',
    num: 3,
    core: '瑟里薩茲是雷神索爾之鎚，象徵守護、衝突與考驗。它是一道尖銳的荊棘，也是保護自我的武器。',
    insight: '你正面臨或即將面臨一場考驗。這不是懲罰，而是宇宙為你量身打造的淬鍊，通過之後你將更為強大。',
    action: '不要逃避衝突，以清醒的頭腦分析障礙，然後果斷出擊。你的邊界需要被清楚建立與守護。',
    core_rev: '逆位的瑟里薩茲警告你可能因衝動而傷人傷己，或陷入無謂的爭鬥之中。',
    insight_rev: '此刻可能有一股破壞性的能量正在影響你的決策，讓你做出後悔的選擇。',
    action_rev: '先暫停行動，深呼吸，不要在憤怒或衝動下做重大決定。靜待風平浪靜再行動。'
  },
  {
    symbol: 'ᚨ', name: 'Ansuz', zh: '安蘇茲・神諭',
    num: 4,
    core: '安蘇茲是奧丁的符文，代表神聖的訊息、語言與智慧。它象徵靈感的降臨與溝通的力量。',
    insight: '宇宙正透過各種徵兆與你說話。留意夢境、巧合與突如其來的靈感——那都是給你的訊息。',
    action: '傾聽，而非只是說話。在溝通中尋求真理，允許智慧透過你流動，無論是文字、演說或創作。',
    core_rev: '逆位的安蘇茲暗示溝通的阻礙、謊言或誤解。你或周圍的人可能沒有說出真相。',
    insight_rev: '你可能錯過了重要的訊號，或有人正在對你隱瞞什麼重要的事情。',
    action_rev: '停止輕信他人的話語，用自己的直覺去分辨真偽。同時，反思自己的表達是否誠實清晰。'
  },
  {
    symbol: 'ᚱ', name: 'Raidho', zh: '萊多・旅程',
    num: 5,
    core: '萊多是旅途與節奏的符文，代表前進中的動力、正確的方向與宇宙的秩序。每一段旅程都有其意義。',
    insight: '你的人生正處於一個移動與變化的階段。無論是外在的旅行還是內在的心靈旅程，都是你成長的道路。',
    action: '信任旅途的過程。制定計劃，但也保持靈活。每一步都有其意義，即便暫時看不清終點。',
    core_rev: '逆位的萊多暗示旅途受阻、計劃延誤或方向迷失。你可能偏離了自己真正的道路。',
    insight_rev: '你目前的方向可能需要調整，某件事的進展比預期中更加緩慢或困難。',
    action_rev: '重新評估你的計劃與目標。有時候倒退一步，才能找到更好的前進路徑。'
  },
  {

    action_rev: '尋找方法與自己的根源和解，同時清晰地劃出健康的界限，讓過去成為力量而非負擔。'
  }
];

// ── Firebase init ──
const firebaseConfig = {
  apiKey: "AIzaSyDEWMEv-0vMixLtjPx2ZPiUzHgtW7cg1ug",
  authDomain: "oz-workspace.firebaseapp.com",
  projectId: "oz-workspace",
  storageBucket: "oz-workspace.firebasestorage.app",
  messagingSenderId: "128483648899",
  appId: "1:128483648899:web:56b21e29cd2c677f7002b6"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
  db.useEmulator('localhost', 8080);
}

let currentUser = null;

// ── Auth ──
auth.onAuthStateChanged(user => {
  currentUser = user;
  if (user) {
    document.getElementById('headerUserName').textContent = user.displayName || user.email;
    document.getElementById('historyArea').classList.add('visible');
    loadHistory();
  }
});

async function logout() {
  await auth.signOut();
  window.location.replace('/login.html');
}

// ── Save rune draw ──
async function saveRune(rune, oriented, label, core, insight, action) {
  if (!currentUser) return;
  try {
    await db.collection('rune_draws').add({
      uid:         currentUser.uid,
      runeName:    rune.name,
      runeZh:      rune.zh,
      runeSymbol:  rune.symbol,
      runeNum:     rune.num,
      oriented,
      label,
      core,
      insight,
      action,
      createdAt:   firebase.firestore.FieldValue.serverTimestamp(),
    });
    await loadHistory();
  } catch(e) {
    console.warn('Failed to save rune draw:', e);
  }
}

// ── Load history ──
async function loadHistory() {
  if (!currentUser) return;
  const listEl = document.getElementById('historyList');
  try {
    const snap = await db.collection('rune_draws')
      .where('uid', '==', currentUser.uid)
      .orderBy('createdAt', 'desc')
      .limit(20)
      .get();

    if (snap.empty) {
      listEl.innerHTML = '<div class="history-empty">尚無記錄，完成第一次占卜後將自動儲存</div>';
      return;
    }

    const draws = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    listEl.innerHTML = draws.map(renderHistoryItem).join('');
  } catch(e) {
    listEl.innerHTML = '<div class="history-empty">無法載入記錄</div>';
    console.warn('History load error:', e);
  }
}

// ── Render history item ──
function renderHistoryItem(d) {
  const date = d.createdAt?.toDate?.()
    ? d.createdAt.toDate().toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' })
    : '—';
  const badge = d.oriented ? 'reversed' : 'upright';

  return `
  <div class="history-item" id="hi-${d.id}">
    <div class="history-summary" onclick="toggleHistoryItem('${d.id}')">
      <div class="history-meta">
        <div class="history-date">${date}</div>
        <div class="history-preview">
          <span class="history-rune-symbol">${escHtml(d.runeSymbol || '')}</span>
          <span>${escHtml(d.runeName || '')} · ${escHtml(d.runeZh || '')}</span>
        </div>
        <div style="margin-top:6px">
          <span class="orientation-badge ${badge}" style="font-size:.68rem;padding:2px 8px">${escHtml(d.label || '')}</span>
        </div>
      </div>
      <span class="history-toggle">▾</span>
    </div>
    <div class="history-detail">
      <div class="history-block">
        <div class="history-block-title">核心意涵</div>
        <div class="history-block-text">${escHtml(d.core || '')}</div>
      </div>
      <div class="history-block">
        <div class="history-block-title">對你問題的啟示</div>
        <div class="history-block-text">${escHtml(d.insight || '')}</div>
      </div>
      <div class="history-block">
        <div class="history-block-title">行動建議</div>
        <div class="history-block-text action">${escHtml(d.action || '')}</div>
      </div>
    </div>
  </div>`;
}

function toggleHistoryItem(id) {
  document.getElementById(`hi-${id}`)?.classList.toggle('open');
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

function generateStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      --dur: ${2 + Math.random() * 4}s;
      --delay: ${Math.random() * 5}s;
      width: ${Math.random() < .2 ? 3 : 2}px;
      height: ${Math.random() < .2 ? 3 : 2}px;
      opacity: ${.1 + Math.random() * .4};
    `;
    container.appendChild(s);
  }
}

function drawCard() {
  const btn = document.getElementById('oracleBtn');
  const runeEl = document.getElementById('oracleRune');
  const area = document.getElementById('cardArea');

  // Brief spin animation on button rune
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 700);

  const rune = RUNES[Math.floor(Math.random() * RUNES.length)];
  const reversed = Math.random() < .45; // slight preference for upright
  const oriented = reversed && rune.name !== 'Gebo' && rune.name !== 'Hagalaz'
                   && rune.name !== 'Isa' && rune.name !== 'Jera'
                   && rune.name !== 'Sowilo' && rune.name !== 'Eihwaz'
                   && rune.name !== 'Ingwaz' && rune.name !== 'Dagaz';

  const label  = oriented ? '逆位' : '正位';
  const badge  = oriented ? 'reversed' : 'upright';
  const core   = oriented ? rune.core_rev   : rune.core;
  const insight= oriented ? rune.insight_rev: rune.insight;
  const action = oriented ? rune.action_rev : rune.action;

  area.innerHTML = `
    <div class="rune-card">
      <div class="card-header">
        <span class="rune-number">ᚠᚢᚦᚨᚱᚲ · ${String(rune.num).padStart(2,'0')}</span>
        <span class="orientation-badge ${badge}">${label}</span>
      </div>

      <span class="rune-symbol${oriented ? ' rev' : ''}">${rune.symbol}</span>
      <div class="rune-name">${rune.name}</div>
      <div class="rune-name-zh">${rune.zh}</div>

      <div class="divider"></div>

      <div class="reading-section">
        <div class="reading-block">
          <h4>核心意涵</h4>
          <p>${core}</p>
        </div>
        <div class="reading-block">
          <h4>對你問題的啟示</h4>
          <p>${insight}</p>
        </div>
        <div class="reading-block action">
          <h4>行動建議</h4>
          <p>${action}</p>
        </div>
      </div>

      <button class="again-btn" id="againBtn">↻ 再次占卜</button>
    </div>
  `;

  document.getElementById('againBtn').addEventListener('click', drawCard);

  // Smooth scroll to card
  setTimeout(() => area.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);

  // Save to Firestore (logged-in users only)
  if (currentUser) saveRune(rune, oriented, label, core, insight, action);
}

generateStars();
document.getElementById('oracleBtn').addEventListener('click', drawCard);
</script>
</body>
</html>
